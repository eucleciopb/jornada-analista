<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
</head>

<body class="bg portal-page admin-page page-kpi-cd">
<div class="container">
  <div class="header">
    <div>
      <h1>Base de KPIs</h1>
      <p id="userInfo" class="userInfo"></p>
    </div>
    <div class="header-actions">
      <button class="btn btn-secondary" id="btnMenu">Voltar ao Menu</button>
      <button class="btn btn-secondary" id="btnLogout">Sair</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Cadastro de KPIs</div>
    <div class="section-desc">Modelo esperado: CD | Ano | Mês | KPI | %. Pode colar do Excel ou importar arquivo.</div>

    <div id="msg" class="msg"></div>

    <button class="btn btn-primary" id="btnNovoMes">Adicionar Mês Novo</button>

    <hr>

    <div class="form-grid">
      <div class="form-group">
        <label>CD</label>
        <input type="text" id="cd" placeholder="Ex: CD - Belém">
      </div>

      <div class="form-group">
        <label>Ano</label>
        <input type="number" id="ano" placeholder="2026">
      </div>

      <div class="form-group">
        <label>Mês</label>
        <select id="mes">
          <option value="">Selecione...</option>
          <option value="1">Janeiro</option>
          <option value="2">Fevereiro</option>
          <option value="3">Março</option>
          <option value="4">Abril</option>
          <option value="5">Maio</option>
          <option value="6">Junho</option>
          <option value="7">Julho</option>
          <option value="8">Agosto</option>
          <option value="9">Setembro</option>
          <option value="10">Outubro</option>
          <option value="11">Novembro</option>
          <option value="12">Dezembro</option>
        </select>
      </div>

      <div class="form-group">
        <label>KPI</label>
        <select id="kpi">
          <option value="">Selecione...</option>
          <option value="1000ML">1000ML</option>
          <option value="300ML">300ML</option>
          <option value="600ML">600ML</option>
          <option value="Cobertura GP">Cobertura GP</option>
          <option value="Eficiência de Visitas">Eficiência de Visitas</option>
          <option value="HL Retornáveis">HL Retornáveis</option>
          <option value="HL Total">HL Total</option>
          <option value="Ocorrências">Ocorrências</option>
        </select>
      </div>

      <div class="form-group">
        <label>%</label>
        <input type="text" id="percentual" placeholder="0,00 ou 0.00">
      </div>

      <div class="form-group" style="align-self:flex-end;">
        <button class="btn btn-primary" id="btnSalvar">Salvar KPI</button>
      </div>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Importação em Lote</div>
    <div class="section-desc">
      Aceita cabeçalhos como: CD, Ano, Mês, KPI, %, Percentual, Resultado ou Valor.
    </div>

    <div class="form-group">
      <textarea id="importArea" placeholder="Cole aqui os dados do Excel..."></textarea>
    </div>

    <button class="btn btn-primary" id="btnImportar">Importar Base Colada</button>

    <hr>

    <div class="form-group">
      <label>Importar arquivo Excel/CSV sem apagar base atual</label>
      <input type="file" id="arquivoExcel" accept=".xlsx,.xls,.csv">
    </div>

    <button class="btn btn-primary" id="btnImportarExcel">Importar Excel sem apagar base</button>
  </div>

  <div class="section">
    <div class="section-title">Tabela de KPIs</div>
    <div class="section-desc">Dados salvos no Firebase.</div>

    <div class="search-box">
      <input type="text" id="busca" placeholder="Buscar por CD, Ano, Mês, KPI ou %...">
    </div>

    <div class="table-wrapper">
      <table>
        <thead>
          <tr>
            <th>Ações</th>
            <th>CD</th>
            <th>Ano</th>
            <th>Mês</th>
            <th>KPI</th>
            <th>%</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import {
  getFirestore, collection, doc, setDoc, deleteDoc, getDocs, query, where, serverTimestamp
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

const firebaseConfig={
  apiKey:"AIzaSyDN7RF9UiFyDAFXsPsVQwSRONJB0t1Xpqg",
  authDomain:"jornada-portal.firebaseapp.com",
  projectId:"jornada-portal",
  storageBucket:"jornada-portal.firebasestorage.app",
  messagingSenderId:"669362296644",
  appId:"1:669362296644:web:f590d9834a8e4e60012911"
};

const db=getFirestore(initializeApp(firebaseConfig));
const COLLECTION="apuracoes_treinamentos";
const TIPO="kpis_cd_mes";

const PATH_INDEX="../index.html";
const PATH_MENU="../html%20menus/menuadm.html";

const cd=document.getElementById("cd");
const ano=document.getElementById("ano");
const mes=document.getElementById("mes");
const kpi=document.getElementById("kpi");
const percentual=document.getElementById("percentual");
const msg=document.getElementById("msg");
const tbody=document.getElementById("tbody");
const busca=document.getElementById("busca");
const importArea=document.getElementById("importArea");
const arquivoExcel=document.getElementById("arquivoExcel");

const btnSalvar=document.getElementById("btnSalvar");
const btnImportar=document.getElementById("btnImportar");
const btnImportarExcel=document.getElementById("btnImportarExcel");
const btnNovoMes=document.getElementById("btnNovoMes");

let CACHE=[];
let EDITING_ID=null;

function safeParse(raw){try{return JSON.parse(raw)}catch{return null}}

function getCurrentUserName(){
  const raw=localStorage.getItem("user_session");
  if(raw){
    const s=safeParse(raw);
    if(s?.nome)return String(s.nome).trim();
  }
  return (localStorage.getItem("usuarioLogado")||"").trim();
}

const usuario=getCurrentUserName();
if(!usuario)window.location.href=PATH_INDEX;

document.getElementById("userInfo").textContent=`Usuário: ${usuario}`;
document.getElementById("btnMenu").onclick=()=>window.location.href=PATH_MENU;
document.getElementById("btnLogout").onclick=()=>{
  localStorage.removeItem("user_session");
  localStorage.removeItem("usuarioLogado");
  window.location.href=PATH_INDEX;
};

function setMsg(text,type="info"){
  msg.textContent=text||"";
  msg.style.color=type==="success"?"#22c55e":type==="error"?"#ef4444":"#6b7280";
}

function normalize(s){
  return String(s??"").replace(/\s+/g," ").trim();
}

function normalizeKey(s){
  return normalize(s)
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9]+/g,"");
}

function slug(s){
  return normalize(s)
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"")
    .replace(/[^a-z0-9]+/g,"-")
    .replace(/(^-|-$)/g,"");
}

function nomeMes(n){
  const meses=["","Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];
  return meses[Number(n)]||"-";
}

function mesLabelCurto(ano,mes){
  const meses=["","Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"];
  return `${meses[Number(mes)]||mes}/${String(ano).slice(-2)}`;
}

function mesParaNumero(valor){
  const v=normalize(String(valor))
    .toLowerCase()
    .normalize("NFD").replace(/[\u0300-\u036f]/g,"");

  if(/^\d+$/.test(v))return Number(v);

  const mapa={
    jan:1,janeiro:1,
    fev:2,fevereiro:2,
    mar:3,marco:3,
    abr:4,abril:4,
    mai:5,maio:5,
    jun:6,junho:6,
    jul:7,julho:7,
    ago:8,agosto:8,
    set:9,setembro:9,
    out:10,outubro:10,
    nov:11,novembro:11,
    dez:12,dezembro:12
  };

  if(v.includes("/")){
    const parte=v.split("/")[0];
    return mapa[parte]||Number(parte)||0;
  }

  return mapa[v]||0;
}

function anoPeloMes(valor,anoValor){
  let anoFinal=Number(anoValor);

  if(!anoFinal && String(valor||"").includes("/")){
    const anoTxt=String(valor).split("/")[1];
    anoFinal=Number(anoTxt.length===2?`20${anoTxt}`:anoTxt);
  }

  return anoFinal;
}

function numeroPercentual(valor){
  let txt=String(valor??"").trim();

  if(!txt)return NaN;

  txt=txt.replace("%","").replace(/\s/g,"");

  if(txt.includes(",") && txt.includes(".")){
    txt=txt.replace(/\./g,"").replace(",",".");
  }else{
    txt=txt.replace(",",".");
  }

  return Number(txt);
}

function makeDocId(item){
  return `kpi_${slug(item.cd)}_${item.ano}_${item.mes}_${slug(item.kpi)}`;
}

function limparForm(){
  cd.value="";
  ano.value="2026";
  mes.value="";
  kpi.value="";
  percentual.value="";
  EDITING_ID=null;
  btnSalvar.textContent="Salvar KPI";
}

function validarBase(base){
  if(!base.cd)return "Preencha o CD.";
  if(!base.ano)return "Preencha o ano.";
  if(!base.mes||base.mes<1||base.mes>12)return "Mês inválido.";
  if(!base.kpi)return "Preencha o KPI.";
  if(!Number.isFinite(base.percentual))return "Percentual inválido.";
  return "";
}

async function salvarItem(base,idManual=null){
  const id=idManual||makeDocId(base);
  const mesKey=`${base.ano}-${String(base.mes).padStart(2,"0")}`;

  await setDoc(doc(db,COLLECTION,id),{
    tipo:TIPO,
    id,
    cd:base.cd,
    cdKey:normalizeKey(base.cd),
    ano:base.ano,
    mes:base.mes,
    mesKey,
    mesNome:nomeMes(base.mes),
    mesLabel:mesLabelCurto(base.ano,base.mes),
    kpi:base.kpi,
    kpiKey:normalizeKey(base.kpi),
    percentual:base.percentual,
    usuarioNome:usuario,
    atualizadoEm:serverTimestamp()
  },{merge:true});

  return id;
}

btnSalvar.onclick=async()=>{
  const base={
    cd:normalize(cd.value),
    ano:Number(ano.value),
    mes:Number(mes.value),
    kpi:normalize(kpi.value),
    percentual:numeroPercentual(percentual.value)
  };

  const erro=validarBase(base);
  if(erro){setMsg(erro,"error");return}

  try{
    setMsg("Salvando...");
    await salvarItem(base,EDITING_ID);
    setMsg("KPI salvo com sucesso ✅","success");
    limparForm();
    await carregar();
  }catch(e){
    console.error(e);
    setMsg(`Erro ao salvar: ${e.code||""} ${e.message||""}`,"error");
  }
};

btnNovoMes.onclick=()=>{
  limparForm();
  ano.value="2026";
  setMsg("Preencha os dados do novo mês.","info");
  window.scrollTo({top:0,behavior:"smooth"});
};

function parseImport(text){
  const linhas=text.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
  if(!linhas.length)return [];

  const primeira=linhas[0].toLowerCase();
  const temCabecalho=primeira.includes("cd")&&primeira.includes("kpi");
  const dados=temCabecalho?linhas.slice(1):linhas;

  return dados.map(linha=>{
    const sep=linha.includes("\t")?"\t":linha.includes(";")?";":",";
    const p=linha.split(sep).map(x=>normalize(x));

    const mesRaw=p[2];
    const anoRaw=p[1];

    return {
      cd:p[0],
      ano:anoPeloMes(mesRaw,anoRaw),
      mes:mesParaNumero(mesRaw),
      kpi:p[3],
      percentual:numeroPercentual(p[4])
    };
  });
}

btnImportar.onclick=async()=>{
  const itens=parseImport(importArea.value);

  if(!itens.length){
    setMsg("Cole a base para importar.","error");
    return;
  }

  const validos=[];

  for(const item of itens){
    const erro=validarBase(item);
    if(erro){
      setMsg(`Erro na importação: ${erro}`,"error");
      return;
    }
    validos.push(item);
  }

  try{
    let count=0;
    for(const item of validos){
      await salvarItem(item);
      count++;
      if(count%50===0||count===validos.length)setMsg(`Importando ${count}/${validos.length}...`);
    }

    importArea.value="";
    setMsg(`Importação concluída ✅ ${validos.length} registros criados/atualizados.`,"success");
    await carregar();

  }catch(e){
    console.error(e);
    setMsg(`Erro ao importar: ${e.code||""} ${e.message||""}`,"error");
  }
};

function normalizarColunas(row){
  const obj={};

  Object.keys(row||{}).forEach(k=>{
    obj[normalizeKey(k)]=row[k];
  });

  const cdValor=
    obj.cd||
    obj.centro||
    obj.cddistribuicao||
    obj.codigocd||
    obj.nomecd||
    obj.cddistribuidor;

  const mesValor=
    obj.mes||
    obj.month||
    obj.periodo||
    obj.mesano||
    obj.competencia;

  const anoValor=
    obj.ano||
    obj.year;

  const kpiValor=
    obj.kpi||
    obj.indicador||
    obj.nomekpi||
    obj.metric||
    obj.metrica;

  const percentualValor=
    obj.percentual??
    obj.porcentagem??
    obj.percent??
    obj.pct??
    obj.perc??
    obj.resultado??
    obj.valor??
    obj[""];

  const mesFinal=mesParaNumero(mesValor);
  const anoFinal=anoPeloMes(mesValor,anoValor);

  return {
    cd:normalize(cdValor),
    ano:anoFinal,
    mes:mesFinal,
    kpi:normalize(kpiValor),
    percentual:numeroPercentual(percentualValor)
  };
}

async function importarExcelArquivo(){
  const file=arquivoExcel.files?.[0];

  if(!file){
    setMsg("Selecione um arquivo Excel primeiro.","error");
    return;
  }

  try{
    setMsg("Lendo arquivo Excel...");

    const buffer=await file.arrayBuffer();
    const workbook=XLSX.read(buffer,{type:"array"});
    const sheet=workbook.Sheets[workbook.SheetNames[0]];
    const rows=XLSX.utils.sheet_to_json(sheet,{defval:""});

    if(!rows.length){
      setMsg("Arquivo vazio.","error");
      return;
    }

    const validos=[];
    const erros=[];

    rows.forEach((row,idx)=>{
      const item=normalizarColunas(row);
      const erro=validarBase(item);

      if(erro){
        erros.push(`Linha ${idx+2}: ${erro}`);
      }else{
        validos.push(item);
      }
    });

    if(!validos.length){
      console.warn(erros);
      alert(erros.slice(0,10).join("\n"));
      setMsg("Nenhuma linha válida encontrada no Excel. Veja o alerta com os primeiros erros.","error");
      return;
    }

    if(!confirm(`Importar ${validos.length} KPI(s)?\n\nIsso NÃO apaga a base atual. Registros iguais serão atualizados.`)){
      return;
    }

    let count=0;

    for(const item of validos){
      await salvarItem(item);
      count++;
      if(count%50===0||count===validos.length){
        setMsg(`Importando ${count}/${validos.length}...`);
      }
    }

    arquivoExcel.value="";
    setMsg(`Importação concluída ✅ ${count} registros criados/atualizados.`,"success");

    if(erros.length)console.warn("Linhas ignoradas:",erros);

    await carregar();

  }catch(e){
    console.error(e);
    setMsg(`Erro ao importar Excel: ${e.code||""} ${e.message||""}`,"error");
  }
}

async function carregar(){
  const q=query(collection(db,COLLECTION),where("tipo","==",TIPO));
  const snap=await getDocs(q);

  const arr=[];
  snap.forEach(d=>arr.push({id:d.id,...d.data()}));

  arr.sort((a,b)=>
    String(a.cd||"").localeCompare(String(b.cd||""),"pt-BR")||
    Number(a.ano||0)-Number(b.ano||0)||
    Number(a.mes||0)-Number(b.mes||0)||
    String(a.kpi||"").localeCompare(String(b.kpi||""),"pt-BR")
  );

  CACHE=arr;
  render();
}

function render(){
  const q=normalize(busca.value).toLowerCase();

  const data=q?CACHE.filter(x=>
    [x.cd,x.ano,x.mesNome,x.mesLabel,x.kpi,x.percentual].join(" ").toLowerCase().includes(q)
  ):CACHE;

  tbody.innerHTML="";

  if(!data.length){
    tbody.innerHTML=`<tr><td colspan="6" class="empty-message">Nenhum KPI cadastrado.</td></tr>`;
    return;
  }

  data.forEach(item=>{
    const tr=document.createElement("tr");

    tr.innerHTML=`
      <td>
        <button class="btn btn-warning" data-edit="${item.id}">Editar</button>
        <button class="btn btn-danger" data-del="${item.id}">Excluir</button>
      </td>
      <td>${item.cd||"-"}</td>
      <td>${item.ano||"-"}</td>
      <td>${item.mesNome||nomeMes(item.mes)}</td>
      <td>${item.kpi||"-"}</td>
      <td>${item.percentual??"-"}%</td>
    `;

    tbody.appendChild(tr);
  });

  tbody.querySelectorAll("[data-edit]").forEach(btn=>{
    btn.onclick=()=>{
      const item=CACHE.find(x=>x.id===btn.getAttribute("data-edit"));
      if(!item)return;

      EDITING_ID=item.id;
      cd.value=item.cd||"";
      ano.value=item.ano||"2026";
      mes.value=item.mes||"";
      kpi.value=item.kpi||"";
      percentual.value=item.percentual??"";

      btnSalvar.textContent="Atualizar KPI";
      setMsg("Editando KPI. Ajuste e salve.","info");
      window.scrollTo({top:0,behavior:"smooth"});
    };
  });

  tbody.querySelectorAll("[data-del]").forEach(btn=>{
    btn.onclick=async()=>{
      const id=btn.getAttribute("data-del");
      if(!id)return;
      if(!confirm("Deseja excluir este KPI?"))return;

      try{
        setMsg("Excluindo...");
        await deleteDoc(doc(db,COLLECTION,id));
        setMsg("KPI excluído ✅","success");
        await carregar();
      }catch(e){
        console.error(e);
        setMsg(`Erro ao excluir: ${e.code||""} ${e.message||""}`,"error");
      }
    };
  });
}

busca.addEventListener("input",render);
btnImportarExcel.onclick=importarExcelArquivo;

ano.value="2026";

try{
  setMsg("Carregando KPIs...");
  await carregar();
  setMsg("");
}catch(e){
  console.error(e);
  setMsg(`Erro ao carregar dados do Firebase: ${e.code||""} ${e.message||""}`,"error");
}
</script>
</body>
</html>
