<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Agenda do Dia | Admin</title>
<link rel="stylesheet" href="../css/styles.css" />
<link rel="stylesheet" href="../css/page-specific.css" />
</head>

<body class="bg portal-page admin-page page-centered">
  <div class="card">

    <div class="header">
      <div>
        <h2>Agenda do Dia — Admin</h2>
        <small id="todayLabel">Data: —</small>
        <div class="hint" id="hint">Carregando…</div>
        <div class="error" id="errorBox"></div>
      </div>

      <div class="actions">
        <button class="btn" id="btnReload">Atualizar</button>

        <!-- ✅ caminho certo -->
        <button class="btn" onclick="location.href='../html menus/menuadm.html'">Voltar</button>
      </div>
    </div>

    <hr>

    <div class="kpis">
      <div class="kpi">Total usuários: <span id="kpiUsers">0</span></div>
      <div class="kpi">Lançaram hoje: <span id="kpiOk">0</span></div>
      <div class="kpi">Pendentes: <span id="kpiPend">0</span></div>
    </div>

    <table>
      <thead>
        <tr>
          <th>Usuário</th>
          <th>Status</th>
          <th>CD / Local</th>
          <th>Atividade</th>
        </tr>
      </thead>
      <tbody id="tbody">
        <tr><td colspan="4">Carregando…</td></tr>
      </tbody>
    </table>

  </div>

  <!-- ✅ CAMINHO CERTO: sai de /html adm/ e vai para /js/ -->
  <script type="module" src="../js/agenda-dia-adm.js"></script>
</body>
</html>
