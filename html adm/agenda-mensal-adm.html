<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Agenda Mensal | Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/bundle-admin.css" />
  <link rel="stylesheet" href="../css/pages/admin-agenda-mensal-adm.css" />
</head>

<body class="theme-admin app-shell page-agenda-mensal">

<header class="topbar">
  <div class="topbar-inner">
    <div>
      <h2>Agenda Mensal — Admin</h2>
      <div id="userInfo" class="hint"></div>
    </div>

    <div class="top-actions">
      <button id="btnExportar" class="btn-primary" type="button">Exportar Excel</button>
      <button id="btnMenu" class="btn-secondary" type="button">Voltar ao Menu</button>
      <button id="btnLogout" class="btn-secondary" type="button">Sair</button>
    </div>
  </div>
</header>

<main class="card wide">

<section class="filters">
  <div>
    <label for="monthPicker">Mês</label>
    <input id="monthPicker" class="field" type="month">
  </div>

  <div>
    <label for="busca">Buscar</label>
    <input id="busca" class="field" type="text" placeholder="Analista, CD ou atividade">
  </div>
</section>

<section class="kpi-grid agenda-mensal-kpis">
  <div class="kpi">
    <span class="kpi-label">Total exibido</span>
    <div class="kpi-value" id="kpiTotal">0</div>
  </div>
  <div class="kpi kpi-ok">
    <span class="kpi-label">Preenchidos</span>
    <div class="kpi-value" id="kpiPreenchidos">0</div>
  </div>
  <div class="kpi kpi-pend">
    <span class="kpi-label">Não preenchidos</span>
    <div class="kpi-value" id="kpiPendentes">0</div>
  </div>
</section>

<div class="table-wrap">
<table class="table table-sticky" id="tabelaAgenda">
<thead>
<tr>
<th>Data</th>
<th>Dia</th>
<th>Analista</th>
<th>CD</th>
<th>Atividade</th>
<th>Obs</th>
<th>Status</th>
</tr>
</thead>
<tbody id="tbody">
<tr><td colspan="7">Carregando…</td></tr>
</tbody>
</table>
</div>

</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  query,
  where
} from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

/* FIREBASE OFICIAL DO PROJETO */
const firebaseConfig = {
  apiKey: "AIzaSyDN7RF9UiFyDAFXsPsVQwSRONJB0t1Xpqg",
  authDomain: "jornada-portal.firebaseapp.com",
  projectId: "jornada-portal",
  storageBucket: "jornada-portal.firebasestorage.app",
  messagingSenderId: "669362296644",
  appId: "1:669362296644:web:f590d9834a8e4e60012911"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const PATH_INDEX = "../index.html";
const PATH_MENUADM = "../html menus/menuadm.html";

const user = localStorage.getItem("usuarioLogado");
if(!user) window.location.href = PATH_INDEX;

document.getElementById("userInfo").textContent = "Admin: " + user;

document.getElementById("btnMenu").onclick = () => {
  window.location.href = PATH_MENUADM;
};

document.getElementById("btnLogout").onclick = () => {
  localStorage.clear();
  window.location.href = PATH_INDEX;
};

const monthPicker = document.getElementById("monthPicker");
const busca = document.getElementById("busca");
const tbody = document.getElementById("tbody");
const kpiTotal = document.getElementById("kpiTotal");
const kpiPreenchidos = document.getElementById("kpiPreenchidos");
const kpiPendentes = document.getElementById("kpiPendentes");
const btnExportar = document.getElementById("btnExportar");

let CACHE = [];
let ROWS_RENDERIZADAS = [];

function pad2(n){
  return String(n).padStart(2,"0");
}

function toMonthKey(d){
  return `${d.getFullYear()}-${pad2(d.getMonth()+1)}`;
}

function toBR(iso){
  if(!iso) return "-";
  const [y,m,d] = iso.split("-");
  return `${d}/${m}/${y}`;
}

function diaSemana(iso){
  if(!iso) return "-";
  const [y,m,d] = iso.split("-");
  const dt = new Date(Number(y), Number(m)-1, Number(d));
  return ["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"][dt.getDay()];
}

function limparTexto(valor){
  return String(valor ?? "")
    .replace(/<[^>]*>/g, "")
    .replace(/\s+/g, " ")
    .trim();
}

function isFilled(x){
  return Boolean(x.cd || x.atividade || x.obs);
}

async function load(){
  const yyyyMM = monthPicker.value;

  tbody.innerHTML = `<tr><td colspan="7" class="cell-empty">Carregando…</td></tr>`;
  if (kpiTotal) kpiTotal.textContent = "0";
  if (kpiPreenchidos) kpiPreenchidos.textContent = "0";
  if (kpiPendentes) kpiPendentes.textContent = "0";

  try{
    const q = query(
      collection(db, "agenda_dias"),
      where("yyyyMM","==",yyyyMM)
    );

    const snap = await getDocs(q);

    CACHE = [];
    snap.forEach(docSnap => {
      CACHE.push({
        id: docSnap.id,
        ...docSnap.data()
      });
    });

    render();

  }catch(error){
    console.error(error);
    tbody.innerHTML = `
      <tr>
        <td colspan="7">
          Erro ao carregar agenda. Verifique Rules, coleção agenda_dias ou campo yyyyMM.
        </td>
      </tr>
    `;
  }
}

function getRowsFiltradas(){
  let rows = CACHE.slice();

  const txt = busca.value.trim().toLowerCase();

  if(txt){
    rows = rows.filter(x =>
      String(x.usuarioNome || "").toLowerCase().includes(txt) ||
      String(x.cd || "").toLowerCase().includes(txt) ||
      String(x.atividade || "").toLowerCase().includes(txt)
    );
  }

  rows.sort((a,b)=>{
    const da = Date.parse(a.data || "");
    const db = Date.parse(b.data || "");

    if(da !== db) return da - db;

    return String(a.usuarioNome || "").localeCompare(
      String(b.usuarioNome || ""),
      "pt-BR"
    );
  });

  return rows;
}

function render(){
  const rows = getRowsFiltradas();
  ROWS_RENDERIZADAS = rows;

  tbody.innerHTML = "";

  const total = rows.length;
  const preenchidos = rows.filter(isFilled).length;
  const pendentes = total - preenchidos;

  if (kpiTotal) kpiTotal.textContent = String(total);
  if (kpiPreenchidos) kpiPreenchidos.textContent = String(preenchidos);
  if (kpiPendentes) kpiPendentes.textContent = String(pendentes);

  if(rows.length === 0){
    tbody.innerHTML = `<tr><td colspan="7" class="cell-empty">Sem registros para o filtro selecionado.</td></tr>`;
    return;
  }

  rows.forEach(x=>{
    const statusTexto = isFilled(x) ? "Preenchido" : "Não preenchido";

    const statusHtml = isFilled(x)
      ? `<span class="status-btn status-ok">Preenchido</span>`
      : `<span class="status-btn status-bad">Não preenchido</span>`;

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${toBR(x.data)}</td>
      <td>${diaSemana(x.data)}</td>
      <td>${limparTexto(x.usuarioNome) || "-"}</td>
      <td>${limparTexto(x.cd) || "-"}</td>
      <td>${limparTexto(x.atividade) || "-"}</td>
      <td>${limparTexto(x.obs) || "-"}</td>
      <td data-status="${statusTexto}">${statusHtml}</td>
    `;

    tbody.appendChild(tr);
  });
}

function exportarExcel(){
  if(!ROWS_RENDERIZADAS.length){
    alert("Não há dados para exportar.");
    return;
  }

  const linhas = [];

  linhas.push([
    "Data",
    "Dia",
    "Analista",
    "CD",
    "Atividade",
    "Observações",
    "Status"
  ]);

  ROWS_RENDERIZADAS.forEach(x=>{
    linhas.push([
      toBR(x.data),
      diaSemana(x.data),
      limparTexto(x.usuarioNome) || "-",
      limparTexto(x.cd) || "-",
      limparTexto(x.atividade) || "-",
      limparTexto(x.obs) || "-",
      isFilled(x) ? "Preenchido" : "Não preenchido"
    ]);
  });

  const htmlTabela = `
    <html>
      <head>
        <meta charset="UTF-8">
      </head>
      <body>
        <table border="1">
          ${linhas.map((linha, index) => `
            <tr>
              ${linha.map(coluna => index === 0
                ? `<th>${String(coluna).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}</th>`
                : `<td>${String(coluna).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")}</td>`
              ).join("")}
            </tr>
          `).join("")}
        </table>
      </body>
    </html>
  `;

  const blob = new Blob([htmlTabela], {
    type: "application/vnd.ms-excel;charset=utf-8;"
  });

  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");

  const mes = monthPicker.value || "agenda";
  a.href = url;
  a.download = `agenda_mensal_${mes}.xls`;

  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);

  URL.revokeObjectURL(url);
}

monthPicker.value = toMonthKey(new Date());

await load();

monthPicker.addEventListener("change", load);
busca.addEventListener("input", render);
btnExportar.addEventListener("click", exportarExcel);
</script>

</body>

</html>
