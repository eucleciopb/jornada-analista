<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Aniversariantes do Mês | Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/bundle-admin.css" />
  <link rel="stylesheet" href="../css/pages/cadastro-nascimento.css" />
</head>
<body class="theme-admin app-shell">
  <header class="topbar">
    <div>
      <h2>Aniversariantes do Mês</h2>
      <div id="userInfo" class="hint" style="color:#d1d5db;margin-top:4px;"></div>
    </div>
    <div class="top-actions">
      <button id="btnMenu" class="btn-secondary" type="button">Voltar ao Menu</button>
      <button id="btnLogout" class="btn-secondary" type="button">Sair</button>
    </div>
  </header>

  <main class="card wide">
    <section>
      <h3 id="tituloMes">Aniversariantes</h3>
      <p class="hint">
        Lista usuários com data de nascimento cadastrada cujo mês coincide com o mês atual.
        Ordenado pelo dia. Visível apenas para administradores.
      </p>
    </section>

    <hr class="sep" />

    <section class="toolbar">
      <button id="btnRecarregar" type="button">Recarregar</button>
      <span id="statusLista" class="status-pill">Carregando...</span>
    </section>

    <p id="msg" class="msg"></p>

    <div id="listaAniversariantes" class="aniversariantes-panel"></div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getFirestore,
      collection,
      getDocs
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    import {
      safeParse,
      nomeMes,
      listarAniversariantesDoMes
    } from "../js/aniversario.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDN7RF9UiFyDAFXsPsVQwSRONJB0t1Xpqg",
      authDomain: "jornada-portal.firebaseapp.com",
      projectId: "jornada-portal",
      storageBucket: "jornada-portal.firebasestorage.app",
      messagingSenderId: "669362296644",
      appId: "1:669362296644:web:f590d9834a8e4e60012911"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const ADMINS = ["Bruna", "Elaine", "Euclecio", "Pedro"];
    const session = safeParse(localStorage.getItem("user_session"));

    if (
      !session ||
      session.perfil !== "admin" ||
      !session.nome ||
      !ADMINS.includes(session.nome)
    ) {
      localStorage.clear();
      window.location.replace("../index2.html");
      throw new Error("Acesso restrito a ADM");
    }

    const userInfo = document.getElementById("userInfo");
    const tituloMes = document.getElementById("tituloMes");
    const listaEl = document.getElementById("listaAniversariantes");
    const statusLista = document.getElementById("statusLista");
    const msg = document.getElementById("msg");
    const mesAtual = new Date().getMonth() + 1;

    userInfo.textContent = `${session.nome} · Administrador`;
    tituloMes.textContent = `Aniversariantes de ${nomeMes(mesAtual)}`;

    document.getElementById("btnMenu").addEventListener("click", () => {
      window.location.href = "../html menus/menuadm.html";
    });

    document.getElementById("btnLogout").addEventListener("click", () => {
      localStorage.removeItem("usuarioLogado");
      localStorage.removeItem("user_session");
      localStorage.removeItem("analistaLogado");
      localStorage.removeItem("usuarioSelecionado");
      window.location.href = "../index2.html";
    });

    document.getElementById("btnRecarregar").addEventListener("click", () => {
      carregar();
    });

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function setMsg(text) {
      msg.textContent = text || "";
    }

    async function carregar() {
      setMsg("");
      statusLista.textContent = "Carregando...";
      listaEl.innerHTML = `<div class="aniversariantes-empty">Buscando aniversariantes...</div>`;

      try {
        const lista = await listarAniversariantesDoMes(db, { collection, getDocs }, mesAtual);

        if (!lista.length) {
          statusLista.textContent = "0 aniversariantes";
          listaEl.innerHTML = `
            <div class="aniversariantes-empty">
              <strong>Nenhum aniversariante neste mês</strong>
              <p>
                Assim que os usuários cadastrarem a data de nascimento e houver coincidência
                com ${escapeHtml(nomeMes(mesAtual))}, a lista aparece aqui ordenada por dia.
              </p>
            </div>`;
          return;
        }

        statusLista.textContent = `${lista.length} aniversariante${lista.length === 1 ? "" : "s"}`;

        const rows = lista.map((item, idx) => {
          const idade =
            item.idadeQueCompleta != null
              ? `${item.idadeQueCompleta} anos`
              : "—";
          return `
            <tr>
              <td>${idx + 1}</td>
              <td class="dia-cell">Dia ${String(item.dia).padStart(2, "0")}</td>
              <td>${escapeHtml(item.nome)}</td>
              <td>${escapeHtml(item.dataNascimentoExibida || "—")}</td>
              <td>${escapeHtml(idade)}</td>
            </tr>`;
        }).join("");

        listaEl.innerHTML = `
          <div class="table-wrap" style="margin-top:8px;">
            <table class="big-table aniversariantes-table" style="width:100%;">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Dia</th>
                  <th>Nome</th>
                  <th>Nascimento</th>
                  <th>Idade que completa</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>`;
      } catch (err) {
        console.error(err);
        statusLista.textContent = "Erro";
        setMsg("Não foi possível carregar os aniversariantes.");
        listaEl.innerHTML = `
          <div class="aniversariantes-empty">
            <strong>Falha ao carregar</strong>
            <p>Verifique a conexão com o Firebase e tente novamente.</p>
          </div>`;
      }
    }

    carregar();
  </script>
</body>
</html>
