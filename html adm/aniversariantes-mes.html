<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Aniversariantes do Time | Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/bundle-admin.css?v=20260714e" />
  <link rel="stylesheet" href="../css/pages/cadastro-nascimento.css?v=20260714e" />
</head>
<body class="theme-admin app-shell">
  <header class="topbar">
    <div>
      <h2>Aniversariantes do Time</h2>
      <div id="userInfo" class="hint" style="color:#d1d5db;margin-top:4px;"></div>
    </div>
    <div class="top-actions">
      <button id="btnMenu" class="btn-secondary" type="button">Voltar ao Menu</button>
      <button id="btnLogout" class="btn-secondary" type="button">Sair</button>
    </div>
  </header>

  <main class="card wide">
    <section>
      <h3>Lista completa classificada por mês</h3>
      <p class="hint">
        Todo o time com data de nascimento cadastrada, agrupado de janeiro a dezembro
        e ordenado pelo dia. O mês atual fica em destaque. Visível apenas para administradores.
      </p>
    </section>

    <hr class="sep" />

    <section class="toolbar">
      <button id="btnRecarregar" type="button">Recarregar</button>
      <span id="statusLista" class="status-pill">Carregando...</span>
    </section>

    <p id="msg" class="msg"></p>

    <div id="listaAniversariantes" class="aniversariantes-panel"></div>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getFirestore,
      collection,
      getDocs,
      doc,
      getDoc
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
    import {
      safeParse,
      nomeMes,
      listarTodosAniversariantes,
      agruparAniversariantesPorMes
    } from "../js/aniversario.js?v=20260715a";

    const firebaseConfig = {
      apiKey: "AIzaSyDN7RF9UiFyDAFXsPsVQwSRONJB0t1Xpqg",
      authDomain: "jornada-portal.firebaseapp.com",
      projectId: "jornada-portal",
      storageBucket: "jornada-portal.firebasestorage.app",
      messagingSenderId: "669362296644",
      appId: "1:669362296644:web:f590d9834a8e4e60012911"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const ADMINS = ["Bruna", "Elaine", "Euclecio", "Pedro"];
    const session = safeParse(localStorage.getItem("user_session"));

    if (
      !session ||
      session.perfil !== "admin" ||
      !session.nome ||
      !ADMINS.includes(session.nome)
    ) {
      localStorage.removeItem("usuarioLogado");
      localStorage.removeItem("user_session");
      localStorage.removeItem("analistaLogado");
      localStorage.removeItem("usuarioSelecionado");
      window.location.replace("../index2.html");
      throw new Error("Acesso restrito a ADM");
    }

    const userInfo = document.getElementById("userInfo");
    const listaEl = document.getElementById("listaAniversariantes");
    const statusLista = document.getElementById("statusLista");
    const msg = document.getElementById("msg");
    const mesAtual = new Date().getMonth() + 1;

    userInfo.textContent = `${session.nome} · Administrador`;

    document.getElementById("btnMenu").addEventListener("click", () => {
      window.location.href = "../html menus/menuadm.html";
    });

    document.getElementById("btnLogout").addEventListener("click", () => {
      localStorage.removeItem("usuarioLogado");
      localStorage.removeItem("user_session");
      localStorage.removeItem("analistaLogado");
      localStorage.removeItem("usuarioSelecionado");
      window.location.href = "../index2.html";
    });

    document.getElementById("btnRecarregar").addEventListener("click", () => {
      carregar();
    });

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function setMsg(text) {
      msg.textContent = text || "";
    }

    function renderLinha(item, idx) {
      const idade =
        item.idadeQueCompleta != null
          ? `${item.idadeQueCompleta} anos`
          : "—";
      return `
        <tr>
          <td>${idx + 1}</td>
          <td class="dia-cell">Dia ${String(item.dia).padStart(2, "0")}</td>
          <td>${escapeHtml(item.nome)}</td>
          <td>${escapeHtml(item.dataNascimentoExibida || "—")}</td>
          <td>${escapeHtml(idade)}</td>
        </tr>`;
    }

    function renderMes(grupo) {
      const atual = grupo.mes === mesAtual;
      const count = grupo.itens.length;
      const badge = atual ? `<span class="mes-badge-atual">Mês atual</span>` : "";
      const countLabel = count === 0
        ? "Nenhum cadastrado"
        : `${count} aniversariante${count === 1 ? "" : "s"}`;

      let body;
      if (!count) {
        body = `<div class="mes-empty">Sem nascimentos cadastrados em ${escapeHtml(grupo.nomeMes)}.</div>`;
      } else {
        const rows = grupo.itens.map((item, idx) => renderLinha(item, idx)).join("");
        body = `
          <div class="table-wrap">
            <table class="big-table aniversariantes-table" style="width:100%;">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Dia</th>
                  <th>Nome</th>
                  <th>Nascimento</th>
                  <th>Idade que completa</th>
                </tr>
              </thead>
              <tbody>${rows}</tbody>
            </table>
          </div>`;
      }

      return `
        <section class="mes-bloco${atual ? " is-atual" : ""}" id="mes-${grupo.mes}">
          <div class="mes-head">
            <h4>${escapeHtml(grupo.nomeMes)} ${badge}</h4>
            <span class="mes-count">${escapeHtml(countLabel)}</span>
          </div>
          ${body}
        </section>`;
    }

    async function carregar() {
      setMsg("");
      statusLista.textContent = "Carregando...";
      listaEl.innerHTML = `<div class="aniversariantes-empty">Buscando aniversariantes do time...</div>`;

      try {
        const lista = await listarTodosAniversariantes(
          db,
          { collection, getDocs, doc, getDoc }
        );
        const grupos = agruparAniversariantesPorMes(lista);
        const comData = lista.length;

        statusLista.textContent = `${comData} cadastrado${comData === 1 ? "" : "s"} no total`;

        if (!comData) {
          listaEl.innerHTML = `
            <div class="aniversariantes-empty">
              <strong>Nenhuma data de nascimento cadastrada</strong>
              <p>
                Assim que o time registrar a data no portal, a lista completa
                aparece aqui classificada por mês.
              </p>
            </div>`;
          return;
        }

        listaEl.innerHTML = `
          <nav class="mes-nav">
            ${grupos.map(g => `
              <a href="#mes-${g.mes}" class="mes-nav-link${g.mes === mesAtual ? " is-atual" : ""}">
                ${escapeHtml(g.nomeMes.slice(0, 3))}
                <small>${g.itens.length}</small>
              </a>`).join("")}
          </nav>
          ${grupos.map(renderMes).join("")}
        `;

        // Rola até o mês atual
        requestAnimationFrame(() => {
          document.getElementById(`mes-${mesAtual}`)?.scrollIntoView({ behavior: "smooth", block: "start" });
        });
      } catch (err) {
        console.error(err);
        statusLista.textContent = "Erro";
        setMsg("Não foi possível carregar os aniversariantes.");
        listaEl.innerHTML = `
          <div class="aniversariantes-empty">
            <strong>Falha ao carregar</strong>
            <p>Verifique a conexão com o Firebase e tente novamente.</p>
          </div>`;
      }
    }

    carregar();
  </script>
</body>
</html>
