<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<meta http-equiv="Pragma" content="no-cache" />
<title>Login Admin | Jornada</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/bundle-login-admin.css?v=20260715a" />
  <link rel="stylesheet" href="css/pages/cadastro-nascimento.css?v=20260715a" />
</head>

<body class="login-page theme-admin">

<div class="card" id="loginView">

  <div class="logo">GP</div>

  <h2>Login Administrativo</h2>
  <small>Acesso restrito ao time administrativo</small>

  <hr>

  <label>Usuário</label>

  <select id="usuarioSelect">
    <option value="">Selecione...</option>
    <option value="Bruna">Bruna</option>
    <option value="Elaine">Elaine</option>
    <option value="Euclecio">Euclecio</option>
    <option value="Pedro">Pedro</option>
  </select>

  <label>Senha</label>

  <input
    type="password"
    id="senha"
    placeholder="Digite a senha"
  >

  <button id="btnEntrar">Entrar</button>

  <div class="error" id="errorMsg"></div>

  <div class="info">
    Grupo Petrópolis • Jornada Comercial
  </div>

</div>

<main class="center-wrapper is-hidden" id="birthView" hidden>
  <div class="login-card nasc-card">
    <div class="logo-box">GP</div>
    <h2>Complete seu perfil</h2>
    <p class="hint">Informe sua data de nascimento para liberar o menu.</p>
    <div class="nasc-user" id="nomeUsuarioNasc">—</div>
    <form id="formNascimento" class="nasc-form" autocomplete="off" novalidate>
      <div class="form-group">
        <label for="dataNascimento">Data de nascimento</label>
        <input id="dataNascimento" type="text" inputmode="numeric" maxlength="10" placeholder="DD/MM/AAAA" required />
        <small class="field-hint">Formato obrigatório: dia/mês/ano (ex.: 15/03/1990)</small>
      </div>
      <button id="btnSalvarNasc" class="btn-primary" type="submit">Salvar e continuar</button>
    </form>
    <p id="msgNasc" class="msg" role="status"></p>
  </div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc,
  setDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
import {
  parseDataNascimento,
  salvarDataNascimento,
  marcarNascimentoNaSessao,
  buscarDataNascimentoSalva
} from "./js/aniversario.js?v=20260715a";

const firebaseConfig = {
  apiKey: "AIzaSyDN7RF9UiFyDAFXsPsVQwSRONJB0t1Xpqg",
  authDomain: "jornada-portal.firebaseapp.com",
  projectId: "jornada-portal",
  storageBucket: "jornada-portal.firebasestorage.app",
  messagingSenderId: "669362296644",
  appId: "1:669362296644:web:f590d9834a8e4e60012911"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const fs = { doc, getDoc, setDoc, serverTimestamp };

const MENU_URL = "html%20menus/menuadm.html?v=20260715a";

const btn = document.getElementById("btnEntrar");
const select = document.getElementById("usuarioSelect");
const senha = document.getElementById("senha");
const errorMsg = document.getElementById("errorMsg");
const loginView = document.getElementById("loginView");
const birthView = document.getElementById("birthView");
const nomeUsuarioNasc = document.getElementById("nomeUsuarioNasc");
const formNascimento = document.getElementById("formNascimento");
const dataNascimentoInput = document.getElementById("dataNascimento");
const btnSalvarNasc = document.getElementById("btnSalvarNasc");
const msgNasc = document.getElementById("msgNasc");

let usuarioAtual = "";

const USUARIOS = {
  Bruna: "B7N4GP26",
  Elaine: "E9L2JP26",
  Euclecio: "U6C8AD26",
  Pedro: "P3D5GP26"
};

btn.addEventListener("click", login);

senha.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    login();
  }
});

select.addEventListener("change", function(){
  senha.value = "";
  errorMsg.style.display = "none";
});

function setMsgNasc(text, ok = false){
  msgNasc.textContent = text || "";
  msgNasc.classList.toggle("ok", Boolean(ok));
}

function mascararData(valor){
  const digits = String(valor || "").replace(/\D/g, "").slice(0, 8);
  if(digits.length <= 2) return digits;
  if(digits.length <= 4) return `${digits.slice(0, 2)}/${digits.slice(2)}`;
  return `${digits.slice(0, 2)}/${digits.slice(2, 4)}/${digits.slice(4)}`;
}

function mostrarFormNascimento(nome){
  usuarioAtual = nome;
  nomeUsuarioNasc.textContent = nome;
  loginView.hidden = true;
  loginView.classList.add("is-hidden");
  birthView.hidden = false;
  birthView.classList.remove("is-hidden");
  dataNascimentoInput.value = "";
  setMsgNasc("");
  dataNascimentoInput.focus();
}

function irParaMenu(){
  window.location.replace(MENU_URL);
}

dataNascimentoInput.addEventListener("input", () => {
  dataNascimentoInput.value = mascararData(dataNascimentoInput.value);
  setMsgNasc("");
});

formNascimento.addEventListener("submit", async (e) => {
  e.preventDefault();
  const parsed = parseDataNascimento(dataNascimentoInput.value);
  if(!parsed){
    setMsgNasc("Informe uma data válida no formato DD/MM/AAAA.");
    dataNascimentoInput.focus();
    return;
  }

  btnSalvarNasc.disabled = true;
  setMsgNasc("Salvando...", true);

  try{
    await salvarDataNascimento(db, fs, usuarioAtual, parsed, {
      perfil: "admin",
      criadoEm: serverTimestamp()
    });
    marcarNascimentoNaSessao(parsed.dataNascimento);
    setMsgNasc("Data salva! Abrindo o menu...", true);
    irParaMenu();
  }catch(err){
    console.error(err);
    setMsgNasc("Não foi possível salvar. Tente novamente.");
    btnSalvarNasc.disabled = false;
  }
});

async function login(){
  const usuario = select.value.trim();
  const senhaDigitada = senha.value.trim();

  errorMsg.style.display = "none";

  if(!usuario){
    errorMsg.textContent = "Selecione um usuário.";
    errorMsg.style.display = "block";
    return;
  }

  if(!USUARIOS[usuario]){
    errorMsg.textContent = "Usuário não autorizado.";
    errorMsg.style.display = "block";
    return;
  }

  if(USUARIOS[usuario] !== senhaDigitada){
    errorMsg.textContent = "Senha incorreta.";
    errorMsg.style.display = "block";
    senha.focus();
    senha.select();
    return;
  }

  btn.disabled = true;

  const session = {
    nome: usuario,
    usuario: usuario,
    perfil: "admin",
    login: new Date().toISOString(),
    nascimentoOk: false
  };

  localStorage.setItem("usuarioLogado", usuario);
  localStorage.setItem("user_session", JSON.stringify(session));

  const jaTem = await buscarDataNascimentoSalva(db, fs, usuario);
  if(jaTem){
    marcarNascimentoNaSessao(jaTem);
    irParaMenu();
    return;
  }

  mostrarFormNascimento(usuario);
  btn.disabled = false;
}
</script>

</body>
</html>
