<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Login Admin | Jornada</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/bundle-login-admin.css" />
</head>

<body class="login-page theme-admin">

<div class="card">

  <div class="logo">GP</div>

  <h2>Login Administrativo</h2>
  <small>Acesso restrito ao time administrativo</small>

  <hr>

  <label>Usuário</label>

  <select id="usuarioSelect">
    <option value="">Selecione...</option>
    <option value="Bruna">Bruna</option>
    <option value="Elaine">Elaine</option>
    <option value="Euclecio">Euclecio</option>
    <option value="Pedro">Pedro</option>
  </select>

  <label>Senha</label>

  <input
    type="password"
    id="senha"
    placeholder="Digite a senha"
  >

  <button id="btnEntrar">Entrar</button>

  <div class="error" id="errorMsg"></div>

  <div class="info">
    Grupo Petrópolis • Jornada Comercial
  </div>

</div>

<script>
const btn = document.getElementById("btnEntrar");
const select = document.getElementById("usuarioSelect");
const senha = document.getElementById("senha");
const errorMsg = document.getElementById("errorMsg");

/*
-----------------------------------
SENHAS POR USUÁRIO
Altere aqui quando quiser
-----------------------------------
*/

const USUARIOS = {
  Bruna: "B7N4GP26",
  Elaine: "E9L2JP26",
  Euclecio: "U6C8AD26",
  Pedro: "P3D5GP26"
};

btn.addEventListener("click", login);

senha.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    login();
  }
});

select.addEventListener("change", function(){
  senha.value = "";
  errorMsg.style.display = "none";
});

function login(){
  const usuario = select.value.trim();
  const senhaDigitada = senha.value.trim();

  errorMsg.style.display = "none";

  if(!usuario){
    errorMsg.textContent = "Selecione um usuário.";
    errorMsg.style.display = "block";
    return;
  }

  if(!USUARIOS[usuario]){
    errorMsg.textContent = "Usuário não autorizado.";
    errorMsg.style.display = "block";
    return;
  }

  if(USUARIOS[usuario] !== senhaDigitada){
    errorMsg.textContent = "Senha incorreta.";
    errorMsg.style.display = "block";
    senha.focus();
    senha.select();
    return;
  }

  // Sempre força o gate de nascimento no pós-login.
  const session = {
    nome: usuario,
    usuario: usuario,
    perfil: "admin",
    login: new Date().toISOString(),
    nascimentoOk: false
  };

  localStorage.setItem("usuarioLogado", usuario);
  localStorage.setItem("user_session", JSON.stringify(session));

  window.location.href = "html%20menus/cadastro-nascimento.html";
}
</script>

</body>
</html>
