<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Login Admin | Jornada</title>

<style>
:root{
  --bg:#0b0f14;
  --card:rgba(255,255,255,.06);
  --border:rgba(255,255,255,.10);
  --text:#ffffff;
  --muted:#9ca3af;
  --danger:#ef4444;
  --primary:#d91b2e;
}

*{
  box-sizing:border-box;
}

body{
  margin:0;
  background:var(--bg);
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
  color:var(--text);
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

.card{
  width:min(420px,100%);
  background:var(--card);
  border:1px solid var(--border);
  border-radius:26px;
  padding:28px;
  box-shadow:0 25px 70px rgba(0,0,0,.45);
  backdrop-filter:blur(14px);
}

.logo{
  width:60px;
  height:60px;
  border-radius:18px;
  background:linear-gradient(135deg,#d91b2e,#ff3b3b);
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  color:#fff;
  margin-bottom:18px;
  font-size:18px;
}

h2{
  margin:0 0 6px;
}

small{
  color:var(--muted);
  font-weight:700;
}

hr{
  margin:22px 0;
  border:none;
  height:1px;
  background:var(--border);
}

label{
  display:block;
  margin-bottom:6px;
  margin-top:14px;
  font-size:12px;
  font-weight:800;
  color:var(--muted);
}

select,
input{
  width:100%;
  padding:14px;
  border-radius:16px;
  border:1px solid var(--border);
  background:rgba(255,255,255,.05);
  color:#fff;
  font-size:14px;
  font-weight:700;
  outline:none;
}

select option{
  color:#000;
}

button{
  margin-top:22px;
  width:100%;
  padding:15px;
  border:none;
  border-radius:16px;
  background:var(--primary);
  color:#fff;
  font-size:15px;
  font-weight:900;
  cursor:pointer;
  transition:.2s;
}

button:hover{
  filter:brightness(1.08);
}

.error{
  margin-top:14px;
  display:none;
  color:var(--danger);
  font-size:13px;
  font-weight:800;
  text-align:center;
}

.info{
  margin-top:18px;
  text-align:center;
  font-size:12px;
  color:#94a3b8;
}
</style>
</head>

<body>

<div class="card">

  <div class="logo">GP</div>

  <h2>Login Administrativo</h2>
  <small>Acesso restrito ao time administrativo</small>

  <hr>

  <label>Usuário</label>

  <select id="usuarioSelect">
    <option value="">Selecione...</option>
    <option value="Bruna">Bruna</option>
    <option value="Elaine">Elaine</option>
    <option value="Euclecio">Euclecio</option>
    <option value="Pedro">Pedro</option>
  </select>

  <label>Senha</label>

  <input
    type="password"
    id="senha"
    placeholder="Digite a senha"
  >

  <button id="btnEntrar">Entrar</button>

  <div class="error" id="errorMsg"></div>

  <div class="info">
    Grupo Petrópolis • Jornada Comercial
  </div>

</div>

<script>
const btn = document.getElementById("btnEntrar");
const select = document.getElementById("usuarioSelect");
const senha = document.getElementById("senha");
const errorMsg = document.getElementById("errorMsg");

/*
-----------------------------------
SENHAS POR USUÁRIO
Altere aqui quando quiser
-----------------------------------
*/

const USUARIOS = {
  Bruna: "B7N4GP26",
  Elaine: "E9L2JP26",
  Euclecio: "U6C8AD26",
  Pedro: "P3D5GP26"
};

/*
-----------------------------------
LOGIN
-----------------------------------
*/

btn.addEventListener("click", login);

senha.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    login();
  }
});

select.addEventListener("change", function(){
  senha.value = "";
  errorMsg.style.display = "none";
});

function login(){
  const usuario = select.value.trim();
  const senhaDigitada = senha.value.trim();

  errorMsg.style.display = "none";

  if(!usuario){
    errorMsg.textContent = "Selecione um usuário.";
    errorMsg.style.display = "block";
    return;
  }

  if(!USUARIOS[usuario]){
    errorMsg.textContent = "Usuário não autorizado.";
    errorMsg.style.display = "block";
    return;
  }

  if(USUARIOS[usuario] !== senhaDigitada){
    errorMsg.textContent = "Senha incorreta.";
    errorMsg.style.display = "block";
    senha.focus();
    senha.select();
    return;
  }

  const session = {
    nome: usuario,
    usuario: usuario,
    perfil: "admin",
    login: new Date().toISOString()
  };

  localStorage.setItem("usuarioLogado", usuario);
  localStorage.setItem("user_session", JSON.stringify(session));

  window.location.href = "html menus/menuadm.html";
}
</script>

</body>
</html>
