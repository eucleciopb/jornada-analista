<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Login Admin | Jornada</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/bundle-login-admin.css" />
</head>

<body class="login-page theme-admin">

<div class="card">

  <div class="logo">GP</div>

  <h2>Login Administrativo</h2>
  <small>Acesso restrito ao time administrativo</small>

  <hr>

  <label>Usuário</label>

  <select id="usuarioSelect">
    <option value="">Selecione...</option>
    <option value="Bruna">Bruna</option>
    <option value="Elaine">Elaine</option>
    <option value="Euclecio">Euclecio</option>
    <option value="Pedro">Pedro</option>
  </select>

  <label>Senha</label>

  <input
    type="password"
    id="senha"
    placeholder="Digite a senha"
  >

  <button id="btnEntrar">Entrar</button>

  <div class="error" id="errorMsg"></div>

  <div class="info">
    Grupo Petrópolis • Jornada Comercial
  </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
import { obterPerfil, temDataNascimento } from "./js/aniversario.js";

const btn = document.getElementById("btnEntrar");
const select = document.getElementById("usuarioSelect");
const senha = document.getElementById("senha");
const errorMsg = document.getElementById("errorMsg");

const firebaseConfig = {
  apiKey: "AIzaSyDN7RF9UiFyDAFXsPsVQwSRONJB0t1Xpqg",
  authDomain: "jornada-portal.firebaseapp.com",
  projectId: "jornada-portal",
  storageBucket: "jornada-portal.firebasestorage.app",
  messagingSenderId: "669362296644",
  appId: "1:669362296644:web:f590d9834a8e4e60012911"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/*
-----------------------------------
SENHAS POR USUÁRIO
Altere aqui quando quiser
-----------------------------------
*/

const USUARIOS = {
  Bruna: "B7N4GP26",
  Elaine: "E9L2JP26",
  Euclecio: "U6C8AD26",
  Pedro: "P3D5GP26"
};

btn.addEventListener("click", login);

senha.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    login();
  }
});

select.addEventListener("change", function(){
  senha.value = "";
  errorMsg.style.display = "none";
});

async function login(){
  const usuario = select.value.trim();
  const senhaDigitada = senha.value.trim();

  errorMsg.style.display = "none";

  if(!usuario){
    errorMsg.textContent = "Selecione um usuário.";
    errorMsg.style.display = "block";
    return;
  }

  if(!USUARIOS[usuario]){
    errorMsg.textContent = "Usuário não autorizado.";
    errorMsg.style.display = "block";
    return;
  }

  if(USUARIOS[usuario] !== senhaDigitada){
    errorMsg.textContent = "Senha incorreta.";
    errorMsg.style.display = "block";
    senha.focus();
    senha.select();
    return;
  }

  const session = {
    nome: usuario,
    usuario: usuario,
    perfil: "admin",
    login: new Date().toISOString()
  };

  localStorage.setItem("usuarioLogado", usuario);
  localStorage.setItem("user_session", JSON.stringify(session));

  btn.disabled = true;

  let destino = "html menus/cadastro-nascimento.html";
  try{
    const perfil = await obterPerfil(db, { doc, getDoc }, usuario);
    if(temDataNascimento(perfil)){
      destino = "html menus/menuadm.html";
    }
  }catch(err){
    console.warn("Não foi possível verificar data de nascimento:", err);
  }

  window.location.href = destino;
}
</script>

</body>
</html>
