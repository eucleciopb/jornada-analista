<!doctype html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Login Admin | Jornada</title>

<style>
  :root{
    --bg:#0b0f14;
    --card:rgba(255,255,255,.06);
    --border:rgba(255,255,255,.10);
    --text:#e5e7eb;
    --muted:#9ca3af;
    --danger:#ef4444;
  }

  *{box-sizing:border-box}

  body{
    margin:0;
    background:var(--bg);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    color:var(--text);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
  }

  .card{
    width:min(420px, 100%);
    background:var(--card);
    border:1px solid var(--border);
    border-radius:26px;
    padding:28px;
    box-shadow:0 25px 70px rgba(0,0,0,.45);
  }

  .logo{
    width:60px;height:60px;
    border-radius:18px;
    background:linear-gradient(135deg,#d91b2e,#ff3b3b);
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:900;
    color:#fff;
    margin-bottom:18px;
    font-size:18px;
  }

  h2{
    margin:0 0 6px 0;
    font-size:18px;
  }

  small{
    color:var(--muted);
    font-weight:700;
  }

  hr{
    margin:20px 0;
    border:none;
    height:1px;
    background:var(--border);
  }

  select{
    width:100%;
    padding:14px;
    border-radius:16px;
    border:1px solid var(--border);
    background:rgba(255,255,255,.04);
    color:var(--text);
    font-weight:900;
    font-size:14px;
    outline:none;
  }

  button{
    margin-top:14px;
    width:100%;
    padding:14px;
    border-radius:16px;
    border:none;
    background:#d91b2e;
    color:#fff;
    font-weight:900;
    font-size:14px;
    cursor:pointer;
    transition:.15s;
  }

  button:hover{
    filter:brightness(1.08);
  }

  .error{
    margin-top:12px;
    font-size:13px;
    font-weight:900;
    color:var(--danger);
    display:none;
  }

</style>
</head>

<body>

<div class="card">

  <div class="logo">GP</div>

  <h2>Login Administrativo</h2>
  <small>Acesso restrito ao time Admin</small>

  <hr>

  <label style="font-size:12px;font-weight:800;color:var(--muted);">
    Selecione seu nome
  </label>

  <select id="usuarioSelect">
    <option value="">Selecione...</option>
    <option value="Bruna">Bruna</option>
    <option value="Elaine">Elaine</option>
    <option value="Euclecio">Euclecio</option>
    <option value="Pedro">Pedro</option>
  </select>

  <button id="btnEntrar">Entrar</button>

  <div class="error" id="errorMsg">
    Usuário não autorizado.
  </div>

</div>

<script>
  const btn = document.getElementById("btnEntrar");
  const select = document.getElementById("usuarioSelect");
  const errorMsg = document.getElementById("errorMsg");

  const ADM_USERS = ["Bruna","Elaine","Euclecio","Pedro"];

  btn.onclick = () => {
    const usuario = select.value.trim();

    if(!ADM_USERS.includes(usuario)){
      errorMsg.style.display = "block";
      return;
    }

    // salva sessão
    localStorage.setItem("usuarioLogado", usuario);

    // redireciona para menu admin
    window.location.href = "html menus/menuadm.html";
  };
</script>

</body>
</html>
