<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Painel de Entregas | Diretoria</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/bundle-admin.css" />
  <link rel="stylesheet" href="../css/pages/admin-painel-entregas.css" />
  <link rel="stylesheet" href="../css/pages/admin-painel-entregas-hub.css" />
</head>

<body class="theme-admin app-shell page-entregas">

<header class="topbar">
  <div class="topbar-inner">
    <div>
      <h2>Painel de Entregas</h2>
      <div id="userInfo" class="hint"></div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <button class="btn btn-ghost" id="btnMenu" type="button">Voltar ao Menu</button>
      <button class="btn btn-ghost" id="btnLogout" type="button">Sair</button>
    </div>
  </div>
</header>

<main>
  <section class="card">
    <div class="row-between">
      <div>
        <h3 style="margin:0 0 6px">Blocos de demandas</h3>
        <div class="hint">Crie um bloco e abra para lançar as entregas. Cada bloco fica separado com seu próprio %.</div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap">
        <button class="btn btn-primary" id="btnNovoBloco" type="button">+ Criar bloco</button>
        <button class="btn btn-ghost" id="btnReload" type="button">Atualizar</button>
      </div>
    </div>

    <div class="filters" style="max-width:240px">
      <div>
        <label for="periodoPicker">Período</label>
        <input id="periodoPicker" class="field" type="month" />
      </div>
    </div>

    <div class="msg" id="msg"></div>
    <div class="hub-grid" id="hubGrid"></div>
  </section>
</main>

<!-- Modal criar bloco -->
<div id="modalBackdrop" class="modal-backdrop" role="dialog" aria-modal="true">
  <div class="modal">
    <div class="modal-header">
      <div>
        <h3>Novo bloco</h3>
        <div class="sub">Dê um nome ao bloco de demandas (ex.: RPS Diretoria, Projeto X)</div>
      </div>
      <button class="modal-close" id="mClose" type="button">Fechar</button>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="full">
          <label for="mTitulo">Nome do bloco *</label>
          <input id="mTitulo" class="field" type="text" maxlength="80" placeholder="Ex: RPS Diretoria Julho" />
        </div>
        <div class="full">
          <label for="mDescricao">Descrição</label>
          <textarea id="mDescricao" class="field" rows="3" placeholder="Para que serve este bloco..."></textarea>
        </div>
        <div class="full">
          <div id="mMsg" class="msg" style="margin:0;min-height:18px"></div>
        </div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-mini" id="btnCancelModal" type="button">Cancelar</button>
      <button class="btn-mini danger" id="btnSaveModal" type="button">Criar bloco</button>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
  import {
    getFirestore,
    collection,
    getDocs,
    query,
    where,
    doc,
    setDoc,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDN7RF9UiFyDAFXsPsVQwSRONJB0t1Xpqg",
    authDomain: "jornada-portal.firebaseapp.com",
    projectId: "jornada-portal",
    storageBucket: "jornada-portal.firebasestorage.app",
    messagingSenderId: "669362296644",
    appId: "1:669362296644:web:f590d9834a8e4e60012911"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const PATH_INDEX = "../index3.html";
  const PATH_MENU = "../html%20menus/menudiretor.html";
  const COLLECTION = "apuracoes_treinamentos";
  const TIPO_ENTREGA = "entrega_gestor";
  const TIPO_BLOCO = "entrega_bloco";

  const BLOCOS_FIXOS = [
    { key: "pedro_ferias", titulo: "Demandas do Pedro — Férias", descricao: "Cobertura enquanto o Pedro está de férias.", ico: "🏖️", cls: "" },
    { key: "demandas_diarias", titulo: "Demandas Diárias", descricao: "Rotina do dia a dia.", ico: "📅", cls: "diarias" },
    { key: "rps_diretoria", titulo: "RPS Diretoria", descricao: "Demandas da RPS Diretoria.", ico: "🏢", cls: "diretoria" }
  ];

  function safeParse(raw) { try { return JSON.parse(raw); } catch { return null; } }
  function getSession() {
    const s = safeParse(localStorage.getItem("user_session"));
    if (s?.nome && s.perfil === "diretor") return s;
    return null;
  }

  const session = getSession();
  if (!session) {
    localStorage.clear();
    window.location.href = PATH_INDEX;
  }

  const diretor = session.nome;
  document.getElementById("userInfo").textContent = `Diretor: ${diretor}`;

  document.getElementById("btnMenu").onclick = () => window.location.href = PATH_MENU;
  document.getElementById("btnLogout").onclick = () => {
    localStorage.removeItem("user_session");
    localStorage.removeItem("usuarioLogado");
    window.location.href = PATH_INDEX;
  };

  const periodoPicker = document.getElementById("periodoPicker");
  const hubGrid = document.getElementById("hubGrid");
  const msg = document.getElementById("msg");
  const modalBackdrop = document.getElementById("modalBackdrop");
  const mTitulo = document.getElementById("mTitulo");
  const mDescricao = document.getElementById("mDescricao");
  const mMsg = document.getElementById("mMsg");
  const btnSaveModal = document.getElementById("btnSaveModal");

  let CUSTOM_BLOCOS = [];
  let ENTREGAS = [];

  function setMsg(text, type = "info") {
    msg.textContent = text || "";
    msg.style.color = type === "success" ? "#22c55e" : (type === "error" ? "#ef4444" : "#d1d5db");
  }
  function setModalMsg(text, type = "info") {
    mMsg.textContent = text || "";
    mMsg.style.color = type === "success" ? "#22c55e" : (type === "error" ? "#ef4444" : "#d1d5db");
  }

  function pad2(n) { return String(n).padStart(2, "0"); }
  function currentPeriodo() {
    return periodoPicker.value || `${new Date().getFullYear()}-${pad2(new Date().getMonth() + 1)}`;
  }
  function todayISO() {
    const d = new Date();
    return `${d.getFullYear()}-${pad2(d.getMonth() + 1)}-${pad2(d.getDate())}`;
  }
  function escapeHtml(s) {
    return (s || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }
  function slug(s) {
    return String(s || "")
      .toLowerCase()
      .normalize("NFD")
      .replace(/[\u0300-\u036f]/g, "")
      .replace(/[^a-z0-9]+/g, "_")
      .replace(/^_|_$/g, "")
      .slice(0, 48) || `bloco_${Date.now()}`;
  }
  function makeId() {
    if (globalThis.crypto?.randomUUID) return crypto.randomUUID();
    return `${Date.now()}_${Math.random().toString(16).slice(2)}`;
  }

  function resolveGrupo(e) {
    const g = String(e.grupo || "").trim();
    if (g) return g;
    return "pedro_ferias";
  }

  function deriveStatus(e) {
    const prog = Number(e.progresso) || 0;
    if (prog >= 100) return "concluida";
    const prazo = String(e.prazo || "").slice(0, 10);
    if (prazo && todayISO() > prazo) return "atrasada";
    if (prog > 0) return "em_andamento";
    return "pendente";
  }

  function computeStats(list) {
    const withStatus = list.map(e => ({ ...e, statusEfetivo: deriveStatus(e) }));
    const total = withStatus.length;
    const done = withStatus.filter(e => e.statusEfetivo === "concluida").length;
    const late = withStatus.filter(e => e.statusEfetivo === "atrasada").length;
    const avgPct = total > 0
      ? Math.round(withStatus.reduce((s, e) => s + (Number(e.progresso) || 0), 0) / total)
      : 0;
    return { total, done, late, avgPct };
  }

  function allBlocos() {
    const custom = CUSTOM_BLOCOS.map(b => ({
      key: b.blocoKey,
      titulo: b.titulo,
      descricao: b.descricao || "Bloco criado pela diretoria.",
      ico: "📦",
      cls: "custom",
      custom: true
    }));
    const fixedKeys = new Set(BLOCOS_FIXOS.map(b => b.key));
    return [...BLOCOS_FIXOS, ...custom.filter(b => !fixedKeys.has(b.key))];
  }

  function cardHtml(bloco, stats) {
    const href = `./painel-entregas.html?grupo=${encodeURIComponent(bloco.key)}&periodo=${encodeURIComponent(currentPeriodo())}`;
    let pillClass = "pill";
    let pillText = "Sem itens";
    let barClass = "progress-bar warn";
    if (stats.total === 0) {
      pillText = "Sem itens";
    } else if (stats.avgPct >= 100) {
      pillClass = "pill pill-ok";
      pillText = "Tudo entregue";
      barClass = "progress-bar";
    } else if (stats.late > 0) {
      pillClass = "pill pill-bad";
      pillText = `${stats.late} atrasada(s)`;
      barClass = "progress-bar bad";
    } else {
      pillClass = "pill pill-info";
      pillText = "Em andamento";
      barClass = stats.avgPct >= 50 ? "progress-bar warn" : "progress-bar bad";
    }

    return `
      <a class="hub-card ${escapeHtml(bloco.cls || "")}" href="${href}">
        <div class="hub-ico">${bloco.ico || "📦"}</div>
        <h3>${escapeHtml(bloco.titulo)}</h3>
        <p>${escapeHtml(bloco.descricao || "")}</p>
        <div class="hub-meta">
          <div>
            <div class="hub-pct">${stats.avgPct}%</div>
            <div class="hub-stats">${stats.total} entrega(s) · ${stats.done} concluída(s)</div>
          </div>
          <span class="${pillClass}">${pillText}</span>
        </div>
        <div class="${barClass}"><span style="width:${stats.avgPct}%"></span></div>
      </a>
    `;
  }

  function renderHub() {
    const periodo = currentPeriodo();
    const doPeriodo = ENTREGAS.filter(e => String(e.periodo || "") === periodo);
    const blocos = allBlocos();

    if (!blocos.length) {
      hubGrid.innerHTML = `<div class="hint">Nenhum bloco ainda. Clique em "+ Criar bloco".</div>`;
      return;
    }

    hubGrid.innerHTML = blocos.map(b => {
      const list = doPeriodo.filter(e => resolveGrupo(e) === b.key);
      return cardHtml(b, computeStats(list));
    }).join("");
  }

  async function loadData() {
    setMsg("Carregando…");
    try {
      const [snapEnt, snapBlocos] = await Promise.all([
        getDocs(query(collection(db, COLLECTION), where("tipo", "==", TIPO_ENTREGA))),
        getDocs(query(collection(db, COLLECTION), where("tipo", "==", TIPO_BLOCO)))
      ]);
      ENTREGAS = snapEnt.docs.map(d => ({ id: d.id, ...d.data() }));
      CUSTOM_BLOCOS = snapBlocos.docs
        .map(d => ({ id: d.id, ...d.data() }))
        .filter(b => b.blocoKey && b.titulo)
        .sort((a, b) => String(a.titulo).localeCompare(String(b.titulo), "pt-BR"));
      setMsg("");
      renderHub();
    } catch (err) {
      console.error(err);
      setMsg("Erro ao carregar. Verifique a conexão com o Firebase.", "error");
    }
  }

  function openModal() {
    setModalMsg("");
    mTitulo.value = "";
    mDescricao.value = "";
    modalBackdrop.classList.add("open");
    mTitulo.focus();
  }
  function closeModal() {
    modalBackdrop.classList.remove("open");
  }

  async function salvarBloco() {
    const titulo = (mTitulo.value || "").trim();
    if (!titulo) {
      setModalMsg("Informe o nome do bloco.", "error");
      return;
    }

    let key = slug(titulo);
    const existentes = new Set(allBlocos().map(b => b.key));
    if (existentes.has(key)) key = `${key}_${makeId().slice(0, 8)}`;

    const id = `bloco_${key}`;
    btnSaveModal.disabled = true;
    setModalMsg("Salvando…");

    try {
      await setDoc(doc(db, COLLECTION, id), {
        tipo: TIPO_BLOCO,
        blocoKey: key,
        titulo,
        descricao: (mDescricao.value || "").trim(),
        createdBy: diretor,
        createdAt: serverTimestamp(),
        updatedAt: serverTimestamp()
      }, { merge: true });

      setModalMsg("");
      setMsg("Bloco criado!", "success");
      closeModal();
      await loadData();
    } catch (err) {
      console.error(err);
      const detail = err?.code === "permission-denied"
        ? "Sem permissão no Firestore."
        : (err?.message || "Erro ao criar bloco.");
      setModalMsg(detail, "error");
    } finally {
      btnSaveModal.disabled = false;
    }
  }

  document.getElementById("btnNovoBloco").onclick = openModal;
  document.getElementById("btnReload").onclick = loadData;
  document.getElementById("mClose").onclick = closeModal;
  document.getElementById("btnCancelModal").onclick = closeModal;
  btnSaveModal.onclick = salvarBloco;
  modalBackdrop.addEventListener("click", (e) => {
    if (e.target === modalBackdrop) closeModal();
  });
  periodoPicker.addEventListener("change", renderHub);

  const now = new Date();
  periodoPicker.value = `${now.getFullYear()}-${pad2(now.getMonth() + 1)}`;
  loadData();
</script>
</body>
</html>
