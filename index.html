<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Portal de Treinamentos</title>
  <link rel="stylesheet" href="css/styles.css" />
</head>

<body class="bg">

<main class="center-wrapper">
  <div class="login-card">
    <div class="logo-box">GP</div>

    <h2>Bem-vindo</h2>
    <p class="hint">Selecione seu nome e digite sua senha para acessar o sistema</p>

    <div class="form-group">
      <label for="usuario">Usuário</label>
      <select id="usuario">
        <option value="" disabled selected>Selecione...</option>
        <option>Alex</option>
        <option>Daniel</option>
        <option>Emerson</option>
        <option>Euclecio</option>
        <option>Felipe</option>
        <option>Joice</option>
        <option>Maiello</option>
        <option>Michel</option>
        <option>Muller</option>
        <option>Robert</option>
        <option>Rodrigo</option>
        <option>Rosilene</option>
        <option>Tenório</option>
        <option>Victor</option>
        <option>Marcio</option>
        <option>Andre</option>
      </select>
    </div>

    <div class="form-group">
      <label for="senha">Senha</label>
      <input id="senha" type="password" placeholder="Digite sua senha" />
    </div>

    <button id="btnEntrar" class="btn-primary" type="button">Entrar</button>

    <p id="msg" class="msg"></p>
  </div>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDN7RF9UiFyDAFXsPsVQwSRONJB0t1Xpqg",
    authDomain: "jornada-portal.firebaseapp.com",
    projectId: "jornada-portal",
    storageBucket: "jornada-portal.firebasestorage.app",
    messagingSenderId: "669362296644",
    appId: "1:669362296644:web:f590d9834a8e4e60012911"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const usuarioSelect = document.getElementById("usuario");
  const senhaInput = document.getElementById("senha");
  const btnEntrar = document.getElementById("btnEntrar");
  const msg = document.getElementById("msg");

  const USUARIOS = {
    Alex: "A70",
    Daniel: "D71",
    Emerson: "B70",
    Euclecio: "E72",
    Felipe: "F73",
    Joice: "J74",
    Maiello: "M75",
    Michel: "M76",
    Muller: "M77",
    Robert: "R78",
    Rodrigo: "R79",
    Rosilene: "R80",
    Tenório: "T81",
    Victor: "V82",
    Marcio: "M83",
    Andre: "A84"
  };

  function setMsg(text, ok = false){
    msg.textContent = text || "";
    msg.style.color = ok ? "#22c55e" : "#ef4444";
  }

  function limparErro(){
    setMsg("");
  }

  usuarioSelect.addEventListener("change", () => {
    senhaInput.value = "";
    limparErro();
    senhaInput.focus();
  });

  senhaInput.addEventListener("keydown", (e) => {
    if(e.key === "Enter"){
      entrar();
    }
  });

  btnEntrar.addEventListener("click", entrar);

  async function entrar(){
    const usuario = (usuarioSelect.value || "").trim();
    const senha = (senhaInput.value || "").trim();

    if(!usuario){
      setMsg("Selecione um usuário.");
      return;
    }

    if(!USUARIOS[usuario]){
      setMsg("Usuário não autorizado.");
      return;
    }

    if(!senha){
      setMsg("Digite sua senha.");
      senhaInput.focus();
      return;
    }

    if(USUARIOS[usuario] !== senha){
      setMsg("Senha incorreta.");
      senhaInput.focus();
      senhaInput.select();
      return;
    }

    btnEntrar.disabled = true;
    btnEntrar.style.opacity = ".7";
    setMsg("Entrando...", true);

    try{
      localStorage.setItem("user_session", JSON.stringify({
        nome: usuario,
        matricula: usuario,
        perfil: "analista",
        loginAt: Date.now()
      }));

      localStorage.setItem("usuarioLogado", usuario);

      await addDoc(collection(db, "acessos"), {
        usuario,
        origem: "index.html",
        evento: "LOGIN_ANALISTA_COM_SENHA",
        criadoEm: serverTimestamp(),
        userAgent: navigator.userAgent || null
      });

      window.location.href = "html menus/menu.html";

    }catch(e){
      console.error(e);
      setMsg("Erro ao entrar. Verifique o Firebase.");
      btnEntrar.disabled = false;
      btnEntrar.style.opacity = "1";
    }
  }
</script>

<style>
.center-wrapper{
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

.login-card{
  width:360px;
  padding:30px;
  border-radius:20px;
  background:rgba(23,25,29,.85);
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 20px 40px rgba(0,0,0,.4);
  text-align:center;
}

.logo-box{
  width:70px;
  height:70px;
  margin:0 auto 20px auto;
  border-radius:18px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  font-size:22px;
  color:#fff;
  background:linear-gradient(135deg,#d91b2e,#ff3b3b);
}

.form-group{
  margin-top:20px;
  text-align:left;
}

.form-group label{
  font-size:12px;
  font-weight:800;
  color:#d1d5db;
}

.form-group select,
.form-group input{
  width:100%;
  padding:12px;
  border-radius:14px;
  border:1px solid rgba(255,255,255,.12);
  background:#1f2329;
  color:#ffffff;
  margin-top:6px;
  outline:none;
}

.form-group select option{
  background:#ffffff;
  color:#111827;
}

.btn-primary{
  width:100%;
  margin-top:20px;
  padding:12px;
  border:none;
  border-radius:14px;
  font-weight:800;
  background:linear-gradient(135deg,#d91b2e,#ff3b3b);
  color:#fff;
  cursor:pointer;
}

.btn-primary:hover{
  filter:brightness(1.08);
}

.msg{
  margin-top:12px;
  font-size:12px;
  font-weight:800;
}

.hint{
  font-size:13px;
  opacity:.7;
}
</style>

</body>
</html>
