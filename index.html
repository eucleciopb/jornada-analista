<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Portal de Treinamentos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/bundle-login-user.css" />
</head>

<body class="login-page theme-user">

<main class="center-wrapper">
  <div class="login-card">
    <div class="logo-box">GP</div>

    <h2>Bem-vindo</h2>
    <p class="hint">Selecione seu nome e digite sua senha para acessar o sistema</p>

    <div class="form-group">
      <label for="usuario">Usuário</label>
      <select id="usuario">
        <option value="" disabled selected>Selecione...</option>
        <option>Alex</option>
        <option>Daniel</option>
        <option>Emerson</option>
        <option>Euclecio</option>
        <option>Felipe</option>
        <option>Joice</option>
        <option>Maiello</option>
        <option>Michel</option>
        <option>Muller</option>
        <option>Robert</option>
        <option>Rodrigo</option>
        <option>Rosilene</option>
        <option>Tenório</option>
        <option>Victor</option>
        <option>Marcio</option>
        <option>Andre</option>
      </select>
    </div>

    <div class="form-group">
      <label for="senha">Senha</label>
      <input id="senha" type="password" placeholder="Digite sua senha" />
    </div>

    <button id="btnEntrar" class="btn-primary" type="button">Entrar</button>

    <p id="msg" class="msg"></p>
  </div>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    serverTimestamp,
    doc,
    getDoc
  } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
  import { obterPerfil, temDataNascimento } from "./js/aniversario.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDN7RF9UiFyDAFXsPsVQwSRONJB0t1Xpqg",
    authDomain: "jornada-portal.firebaseapp.com",
    projectId: "jornada-portal",
    storageBucket: "jornada-portal.firebasestorage.app",
    messagingSenderId: "669362296644",
    appId: "1:669362296644:web:f590d9834a8e4e60012911"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const usuarioSelect = document.getElementById("usuario");
  const senhaInput = document.getElementById("senha");
  const btnEntrar = document.getElementById("btnEntrar");
  const msg = document.getElementById("msg");

  const USUARIOS = {
    Alex: "A70",
    Daniel: "D71",
    Emerson: "B70",
    Euclecio: "E72",
    Felipe: "F73",
    Joice: "J74",
    Maiello: "M75",
    Michel: "M76",
    Muller: "M77",
    Robert: "R78",
    Rodrigo: "R79",
    Rosilene: "R80",
    Tenório: "T81",
    Victor: "V82",
    Marcio: "M83",
    Andre: "A84"
  };

  function setMsg(text, ok = false){
    msg.textContent = text || "";
    msg.style.color = ok ? "#22c55e" : "#ef4444";
  }

  function limparErro(){
    setMsg("");
  }

  usuarioSelect.addEventListener("change", () => {
    senhaInput.value = "";
    limparErro();
    senhaInput.focus();
  });

  senhaInput.addEventListener("keydown", (e) => {
    if(e.key === "Enter"){
      entrar();
    }
  });

  btnEntrar.addEventListener("click", entrar);

  async function entrar(){
    const usuario = (usuarioSelect.value || "").trim();
    const senha = (senhaInput.value || "").trim();

    if(!usuario){
      setMsg("Selecione um usuário.");
      return;
    }

    if(!USUARIOS[usuario]){
      setMsg("Usuário não autorizado.");
      return;
    }

    if(!senha){
      setMsg("Digite sua senha.");
      senhaInput.focus();
      return;
    }

    if(USUARIOS[usuario] !== senha){
      setMsg("Senha incorreta.");
      senhaInput.focus();
      senhaInput.select();
      return;
    }

    btnEntrar.disabled = true;
    btnEntrar.style.opacity = ".7";
    setMsg("Entrando...", true);

    try{
      localStorage.setItem("user_session", JSON.stringify({
        nome: usuario,
        matricula: usuario,
        perfil: "analista",
        loginAt: Date.now()
      }));

      localStorage.setItem("usuarioLogado", usuario);

      await addDoc(collection(db, "acessos"), {
        usuario,
        origem: "index.html",
        evento: "LOGIN_ANALISTA_COM_SENHA",
        criadoEm: serverTimestamp(),
        userAgent: navigator.userAgent || null
      });

      let destino = "html menus/cadastro-nascimento.html";
      try{
        const perfil = await obterPerfil(db, { doc, getDoc }, usuario);
        if(temDataNascimento(perfil)){
          destino = "html menus/menu.html";
        }
      }catch(perfilErr){
        console.warn("Não foi possível verificar data de nascimento:", perfilErr);
      }

      window.location.href = destino;

    }catch(e){
      console.error(e);
      setMsg("Erro ao entrar. Verifique o Firebase.");
      btnEntrar.disabled = false;
      btnEntrar.style.opacity = "1";
    }
  }
</script>
</body>
</html>
