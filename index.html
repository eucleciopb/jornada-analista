<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <title>Portal de Treinamentos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/bundle-login-user.css?v=20260715b" />
  <link rel="stylesheet" href="css/pages/cadastro-nascimento.css?v=20260715b" />
</head>

<body class="login-page theme-user">

<main class="center-wrapper" id="loginView">
  <div class="login-card">
    <div class="logo-box">GP</div>

    <h2>Bem-vindo</h2>
    <p class="hint">Selecione seu nome e digite sua senha para acessar o sistema</p>

    <div class="form-group">
      <label for="usuario">Usuário</label>
      <select id="usuario">
        <option value="" disabled selected>Selecione...</option>
        <option>Alex</option>
        <option>Daniel</option>
        <option>Emerson</option>
        <option>Euclecio</option>
        <option>Felipe</option>
        <option>Joice</option>
        <option>Maiello</option>
        <option>Michel</option>
        <option>Muller</option>
        <option>Robert</option>
        <option>Rodrigo</option>
        <option>Rosilene</option>
        <option>Tenório</option>
        <option>Victor</option>
        <option>Marcio</option>
        <option>Andre</option>
      </select>
    </div>

    <div class="form-group">
      <label for="senha">Senha</label>
      <input id="senha" type="password" placeholder="Digite sua senha" />
    </div>

    <button id="btnEntrar" class="btn-primary" type="button">Entrar</button>

    <p id="msg" class="msg"></p>
  </div>
</main>

<main class="center-wrapper is-hidden" id="birthView" hidden>
  <div class="login-card nasc-card">
    <div class="logo-box">GP</div>
    <h2>Complete seu perfil</h2>
    <p class="hint">Informe sua data de nascimento para liberar o menu.</p>

    <div class="nasc-user" id="nomeUsuarioNasc">—</div>

    <form id="formNascimento" class="nasc-form" autocomplete="off" novalidate>
      <div class="form-group">
        <label for="dataNascimento">Data de nascimento</label>
        <input
          id="dataNascimento"
          name="dataNascimento"
          type="text"
          inputmode="numeric"
          maxlength="10"
          placeholder="DD/MM/AAAA"
          required
        />
        <small class="field-hint">Formato obrigatório: dia/mês/ano (ex.: 15/03/1990)</small>
      </div>

      <button id="btnSalvarNasc" class="btn-primary" type="submit">Salvar e continuar</button>
    </form>

    <p id="msgNasc" class="msg" role="status"></p>
  </div>
</main>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
  import {
    getFirestore,
    collection,
    addDoc,
    serverTimestamp,
    doc,
    getDoc,
    setDoc
  } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";
  import {
    parseDataNascimento,
    salvarDataNascimento,
    marcarNascimentoNaSessao,
    buscarDataNascimentoSalva,
    obterNascimentoRapido
  } from "./js/aniversario.js?v=20260721a";
  import {
    montarSessaoLogin,
    salvarSessao,
    destinoMenuPorPerfil,
    PERFIL_TREINAMENTO_PRODUTOS
  } from "./js/perfil-acesso.js?v=20260720g";

  const firebaseConfig = {
    apiKey: "AIzaSyDN7RF9UiFyDAFXsPsVQwSRONJB0t1Xpqg",
    authDomain: "jornada-portal.firebaseapp.com",
    projectId: "jornada-portal",
    storageBucket: "jornada-portal.firebasestorage.app",
    messagingSenderId: "669362296644",
    appId: "1:669362296644:web:f590d9834a8e4e60012911"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const fs = { doc, getDoc, setDoc, serverTimestamp };

  const usuarioSelect = document.getElementById("usuario");
  const senhaInput = document.getElementById("senha");
  const btnEntrar = document.getElementById("btnEntrar");
  const msg = document.getElementById("msg");

  const loginView = document.getElementById("loginView");
  const birthView = document.getElementById("birthView");
  const nomeUsuarioNasc = document.getElementById("nomeUsuarioNasc");
  const formNascimento = document.getElementById("formNascimento");
  const dataNascimentoInput = document.getElementById("dataNascimento");
  const btnSalvarNasc = document.getElementById("btnSalvarNasc");
  const msgNasc = document.getElementById("msgNasc");

  let usuarioAtual = "";
  let perfilAtual = "analista";

  const USUARIOS = {
    Alex: "A70",
    Daniel: "D71",
    Emerson: "B70",
    Euclecio: "E72",
    Felipe: "F73",
    Joice: "J74",
    Maiello: "M75",
    Michel: "M76",
    Muller: "M77",
    Robert: "R78",
    Rodrigo: "R79",
    Rosilene: "R80",
    Tenório: "T81",
    Victor: "V82",
    Marcio: "M83",
    Andre: "A84"
  };

  function setMsg(text, ok = false){
    msg.textContent = text || "";
    msg.style.color = ok ? "#22c55e" : "#ef4444";
  }

  function setMsgNasc(text, ok = false){
    msgNasc.textContent = text || "";
    msgNasc.classList.toggle("ok", Boolean(ok));
  }

  function limparErro(){
    setMsg("");
  }

  function mostrarFormNascimento(nome){
    usuarioAtual = nome;
    nomeUsuarioNasc.textContent = nome;
    loginView.hidden = true;
    loginView.classList.add("is-hidden");
    birthView.hidden = false;
    birthView.classList.remove("is-hidden");
    dataNascimentoInput.value = "";
    setMsgNasc("");
    dataNascimentoInput.focus();
  }

  function irParaMenu(){
    const nomeLogin = String(usuarioAtual || usuarioSelect.value || "").trim();
    const nomeKey = nomeLogin.toLowerCase();

    // Alex e Euclecio → menu de treinamentos de produtos (resumo)
    if (nomeKey === "alex" || nomeKey === "euclecio") {
      try {
        const raw = localStorage.getItem("user_session");
        const s = raw ? JSON.parse(raw) : {};
        const isAlex = nomeKey === "alex";
        localStorage.setItem("user_session", JSON.stringify({
          ...s,
          nome: isAlex ? "Alex" : "Euclecio",
          matricula: isAlex ? "A70" : "E72",
          uidKey: isAlex ? "alex" : "euclecio",
          perfil: "treinamento_produtos",
          tipoUsuario: "treinamento_produtos"
        }));
        localStorage.setItem("usuarioLogado", isAlex ? "Alex" : "Euclecio");
      } catch {}
      window.location.replace("html%20menus/menu_alex.html?v=20260720g");
      return;
    }

    const dest = destinoMenuPorPerfil(perfilAtual, { fromRoot: true, encoded: true });
    if (String(dest).includes("menu_alex")) {
      window.location.replace("html%20menus/menu.html?v=20260720g");
      return;
    }
    window.location.replace(`${dest}?v=20260720g`);
  }

  function mascararData(valor){
    const digits = String(valor || "").replace(/\D/g, "").slice(0, 8);
    if(digits.length <= 2) return digits;
    if(digits.length <= 4) return `${digits.slice(0, 2)}/${digits.slice(2)}`;
    return `${digits.slice(0, 2)}/${digits.slice(2, 4)}/${digits.slice(4)}`;
  }

  usuarioSelect.addEventListener("change", () => {
    senhaInput.value = "";
    limparErro();
    senhaInput.focus();
  });

  senhaInput.addEventListener("keydown", (e) => {
    if(e.key === "Enter"){
      entrar();
    }
  });

  btnEntrar.addEventListener("click", entrar);

  dataNascimentoInput.addEventListener("input", () => {
    dataNascimentoInput.value = mascararData(dataNascimentoInput.value);
    setMsgNasc("");
  });

  formNascimento.addEventListener("submit", async (e) => {
    e.preventDefault();
    const parsed = parseDataNascimento(dataNascimentoInput.value);
    if(!parsed){
      setMsgNasc("Informe uma data válida no formato DD/MM/AAAA.");
      dataNascimentoInput.focus();
      dataNascimentoInput.select();
      return;
    }

    btnSalvarNasc.disabled = true;
    setMsgNasc("Salvando no banco...", true);

    try{
      await salvarDataNascimento(db, fs, usuarioAtual, parsed, {
        perfil: perfilAtual
      });
      marcarNascimentoNaSessao(parsed.dataNascimento);
      setMsgNasc("Salvo no banco! Abrindo o menu...", true);
      irParaMenu();
    }catch(err){
      console.error(err);
      setMsgNasc(err?.message || "Não foi possível salvar no banco. Tente novamente.");
      btnSalvarNasc.disabled = false;
    }
  });

  async function entrar(){
    const usuario = (usuarioSelect.value || "").trim();
    const senha = (senhaInput.value || "").trim();

    if(!usuario){
      setMsg("Selecione um usuário.");
      return;
    }

    if(!USUARIOS[usuario]){
      setMsg("Usuário não autorizado.");
      return;
    }

    if(!senha){
      setMsg("Digite sua senha.");
      senhaInput.focus();
      return;
    }

    if(USUARIOS[usuario] !== senha){
      setMsg("Senha incorreta.");
      senhaInput.focus();
      senhaInput.select();
      return;
    }

    btnEntrar.disabled = true;
    btnEntrar.style.opacity = ".7";
    setMsg("Entrando...", true);

    try{
      const sessao = montarSessaoLogin(usuario);
      perfilAtual = sessao.perfil;
      salvarSessao(sessao);

      try{
        await addDoc(collection(db, "acessos"), {
          usuario,
          matricula: sessao.matricula,
          uidKey: sessao.uidKey,
          perfil: sessao.perfil,
          origem: "index.html",
          evento: sessao.perfil === PERFIL_TREINAMENTO_PRODUTOS
            ? "LOGIN_TREINAMENTO_PRODUTOS"
            : "LOGIN_ANALISTA_COM_SENHA",
          criadoEm: serverTimestamp(),
          userAgent: navigator.userAgent || null
        });
      }catch(logErr){
        console.warn("Log de acesso falhou:", logErr);
      }

      setMsg("Verificando perfil...", true);
      const rapido = obterNascimentoRapido(usuario);
      if (rapido) {
        marcarNascimentoNaSessao(rapido);
        setMsg(
          sessao.perfil === PERFIL_TREINAMENTO_PRODUTOS
            ? "Login ok! Abrindo o menu de treinamentos..."
            : "Login ok! Abrindo o menu...",
          true
        );
        // Confirma no banco em background (não bloqueia entrada)
        buscarDataNascimentoSalva(db, fs, usuario).catch(() => {});
        irParaMenu();
        return;
      }

      const jaTem = await buscarDataNascimentoSalva(db, fs, usuario);
      if(jaTem){
        marcarNascimentoNaSessao(jaTem);
        setMsg(
          sessao.perfil === PERFIL_TREINAMENTO_PRODUTOS
            ? "Login ok! Abrindo o menu de treinamentos..."
            : "Login ok! Abrindo o menu...",
          true
        );
        irParaMenu();
        return;
      }

      // Sem data no banco → mostra formulário
      setMsg("");
      mostrarFormNascimento(usuario);
      btnEntrar.disabled = false;
      btnEntrar.style.opacity = "1";

    }catch(e){
      console.error(e);
      setMsg(e?.message || "Erro ao entrar. Verifique o Firebase.");
      btnEntrar.disabled = false;
      btnEntrar.style.opacity = "1";
    }
  }
</script>
</body>
</html>
