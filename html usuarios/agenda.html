<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Agenda - Resumo do Analista</title>

  <style>
    :root{
      --bg:#0b0f14;
      --card:rgba(255,255,255,.06);
      --border:rgba(255,255,255,.10);
      --text:#e5e7eb;
      --muted:#9ca3af;
      --danger:#ef4444;
      --ok:#22c55e;
      --warn:#f59e0b;
      --field:rgba(0,0,0,.30);
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto;background:var(--bg);color:var(--text)}
    .topbar{display:flex;justify-content:space-between;align-items:center;gap:14px;padding:18px 22px}
    .topbar h2{margin:0;font-size:18px}
    .hint{color:var(--muted);font-size:12px;margin-top:4px}
    .err{color:var(--danger);font-weight:900;font-size:12px;margin-top:6px;display:none;white-space:pre-wrap}
    .wrap{max-width:1200px;margin:0 auto;padding:0 18px 30px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px}
    .row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;justify-content:space-between}
    label{font-size:12px;color:var(--muted);display:block;margin-bottom:6px}
    input[type="month"]{
      padding:10px 12px;border-radius:12px;border:1px solid var(--border);
      background:var(--field);color:var(--text)
    }
    .btn{border:1px solid var(--border);border-radius:12px;padding:10px 14px;font-weight:900;cursor:pointer;background:transparent;color:var(--text)}
    .btn-primary{background:var(--danger);border-color:transparent}
    .btn-primary:hover{filter:brightness(1.06)}
    .pill{display:inline-flex;align-items:center;gap:8px;padding:6px 10px;border-radius:999px;border:1px solid var(--border);font-size:12px;color:var(--muted)}
    .dot{width:8px;height:8px;border-radius:50%}
    .dot.ok{background:var(--ok)}
    .dot.warn{background:var(--warn)}
    .dot.danger{background:var(--danger)}
    .cardsMini{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px;margin-top:12px}
    .mini{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:14px;padding:12px}
    .mini .t{font-size:12px;color:var(--muted)}
    .mini .v{margin-top:6px;font-size:18px;font-weight:1000}
    .table-wrap{overflow:auto;margin-top:14px;border-radius:14px;border:1px solid var(--border)}
    table{width:100%;border-collapse:collapse;min-width:980px;background:rgba(255,255,255,.03)}
    thead th{position:sticky;top:0;background:rgba(0,0,0,.35);backdrop-filter:blur(8px);text-align:left;font-size:12px;color:var(--muted);padding:12px;border-bottom:1px solid var(--border)}
    tbody td{padding:10px 12px;border-bottom:1px solid rgba(255,255,255,.06);vertical-align:top}
    tbody tr:hover{background:rgba(255,255,255,.04)}
    .badge{display:inline-flex;align-items:center;gap:8px;padding:6px 10px;border-radius:999px;border:1px solid var(--border);font-size:12px;color:var(--muted)}
    .mono{font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;}
    .empty{padding:14px;text-align:center;color:var(--muted)}
    @media (max-width:720px){
      .topbar{flex-direction:column;align-items:flex-start}
      table{min-width:860px}
    }
  </style>
</head>

<body>
  <header class="topbar">
    <div>
      <h2>Agenda (Resumo)</h2>
      <div class="hint" id="userInfo"></div>
      <div class="err" id="errBox"></div>
    </div>
    <div style="display:flex;gap:10px;flex-wrap:wrap">
      <!-- ✅ você está em /html usuarios/ então volta 1 nível e entra em /html menus/ -->
      <button class="btn" id="btnMenu" type="button">Voltar ao Menu</button>
      <button class="btn" id="btnLogout" type="button">Sair</button>
    </div>
  </header>

  <div class="wrap">
    <main class="card">
      <div class="row">
        <div>
          <h3 style="margin:0 0 6px">Minha agenda do mês</h3>
          <div class="hint">Mostra o resumo do que foi registrado no Firestore para o seu usuário.</div>
          <div class="hint">Fonte: coleção <span class="mono">agenda_dias</span>.</div>
        </div>

        <div class="pill" id="statusPill"><span class="dot warn"></span> Status: aguardando</div>
      </div>

      <hr style="border:none;height:1px;background:rgba(255,255,255,.10);margin:16px 0">

      <div class="row">
        <div>
          <label for="monthPicker">Mês</label>
          <input id="monthPicker" type="month" />
        </div>
        <div style="display:flex;gap:10px;flex-wrap:wrap">
          <button class="btn btn-primary" id="btnRecarregar" type="button">Recarregar</button>
        </div>
      </div>

      <div class="cardsMini" id="cardsMini"></div>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:140px;">Data</th>
              <th style="width:110px;">Dia</th>
              <th style="width:280px;">CD</th>
              <th style="width:260px;">Atividade</th>
              <th>Observações</th>
            </tr>
          </thead>
          <tbody id="tbodyAgenda">
            <tr><td colspan="5" class="empty">Carregando…</td></tr>
          </tbody>
        </table>
      </div>

      <div class="hint" style="margin-top:10px;">
        Se não aparecer nada, pode ser porque ainda não existe registro seu nesse mês em <span class="mono">agenda_dias</span>.
      </div>
    </main>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js";
    import {
      getFirestore, collection, query, orderBy, startAt, endAt, getDocs,
      Timestamp
    } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

    /* =========================
       FIREBASE CONFIG (SEU)
    ========================= */
    const firebaseConfig = {
      apiKey: "AIzaSyDN7RF9UiFyDAFXsPsVQwSRONJB0t1Xpqg",
      authDomain: "jornada-portal.firebaseapp.com",
      projectId: "jornada-portal",
      storageBucket: "jornada-portal.firebasestorage.app",
      messagingSenderId: "669362296644",
      appId: "1:669362296644:web:f590d9834a8e4e60012911"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    /* =========================
       LOGIN CHECK (B)
       - usa user_session
       - fallback: usuarioLogado
    ========================= */
    const SESSION_KEY = "user_session";

    function safeParse(raw){
      try{ return JSON.parse(raw); } catch { return null; }
    }

    function readSession(){
      const raw = localStorage.getItem(SESSION_KEY);
      if(raw){
        const s = safeParse(raw);
        if(s?.nome) return s;
      }
      // fallback legado
      const u = (localStorage.getItem("usuarioLogado") || "").trim();
      if(u){
        return { nome: u, matricula: u, perfil: "analista", cd: "" };
      }
      return null;
    }

    const session = readSession();
    if(!session){
      // você está em /html usuarios/
      window.location.href = "../index.html";
    }

    /* =========================
       UI
    ========================= */
    const $ = (id) => document.getElementById(id);
    const errBox = $("errBox");
    const statusPill = $("statusPill");
    const userInfo = $("userInfo");
    const monthPicker = $("monthPicker");
    const tbody = $("tbodyAgenda");
    const cardsMini = $("cardsMini");

    userInfo.textContent = `Usuário: ${session.nome} • Perfil: ${session.perfil || "—"} • CD: ${session.cd || "—"}`;

    function setStatus(kind, text){
      const dotClass = kind === "ok" ? "ok" : (kind === "danger" ? "danger" : "warn");
      statusPill.innerHTML = `<span class="dot ${dotClass}"></span> ${text}`;
    }
    function showErr(msg){
      errBox.style.display = "block";
      errBox.textContent = msg;
    }
    function clearErr(){
      errBox.style.display = "none";
      errBox.textContent = "";
    }

    function pad(n){ return String(n).padStart(2,"0"); }
    function startOfMonth(y, mIdx){ return new Date(y, mIdx, 1, 0,0,0,0); }
    function endOfMonth(y, mIdx){ return new Date(y, mIdx+1, 0, 23,59,59,999); }
    function weekdayShort(d){ return d.toLocaleDateString("pt-BR",{weekday:"short"}); }
    function brDate(d){ return d.toLocaleDateString("pt-BR"); }

    // Tenta reconhecer o "dono" do registro com vários nomes de campo
    function isMine(data){
      const nome = (session.nome || "").toLowerCase();
      const matricula = (session.matricula || "").toLowerCase();

      const a1 = (data.analista || "").toLowerCase();
      const a2 = (data.usuario || "").toLowerCase();
      const a3 = (data.nomeAnalista || "").toLowerCase();
      const a4 = (data.analistaId || "").toLowerCase();
      const a5 = (data.matricula || "").toLowerCase();

      return [a1,a2,a3,a4,a5].some(v => v && (v === nome || v === matricula));
    }

    function getDateFromDoc(data){
      // prioridade: Timestamp 'data'
      if(data?.data?.toDate) return data.data.toDate();
      // fallback: dataString "YYYY-MM-DD"
      if(typeof data?.dataString === "string" && data.dataString.includes("-")){
        const dt = new Date(data.dataString + "T00:00:00");
        if(!isNaN(dt)) return dt;
      }
      // fallback: "dia" number + "mes" string (se existir)
      return null;
    }

    function getField(data, ...keys){
      for(const k of keys){
        if(data && data[k] != null && String(data[k]).trim() !== "") return String(data[k]).trim();
      }
      return "";
    }

    function renderSummary(items){
      const diasComAgenda = items.length;

      const cds = new Set();
      const atividades = new Map(); // atividade -> count

      items.forEach(it=>{
        const cd = getField(it, "cd", "CD", "centroDistribuicao");
        if(cd) cds.add(cd);

        const atv = getField(it, "atividade", "Atividade", "tipo", "acao");
        const k = atv || "—";
        atividades.set(k, (atividades.get(k) || 0) + 1);
      });

      // top atividade
      let topAtv = "—";
      let topQtd = 0;
      for(const [k,v] of atividades.entries()){
        if(v > topQtd){ topQtd = v; topAtv = k; }
      }

      cardsMini.innerHTML = `
        <div class="mini">
          <div class="t">Dias com agenda</div>
          <div class="v">${diasComAgenda}</div>
        </div>
        <div class="mini">
          <div class="t">CDs no mês</div>
          <div class="v">${cds.size}</div>
        </div>
        <div class="mini">
          <div class="t">Atividade mais comum</div>
          <div class="v" style="font-size:14px;line-height:1.2">${topAtv}</div>
        </div>
        <div class="mini">
          <div class="t">Registros carregados</div>
          <div class="v">${items.length}</div>
        </div>
      `;
    }

    function renderTable(items){
      if(items.length === 0){
        tbody.innerHTML = `<tr><td colspan="5" class="empty">Sem registros para este mês.</td></tr>`;
        return;
      }

      const rows = items.map(it=>{
        const dt = getDateFromDoc(it);
        const cd = getField(it, "cd", "CD", "centroDistribuicao") || "—";
        const atividade = getField(it, "atividade", "Atividade", "tipo", "acao") || "—";
        const obs = getField(it, "observacoes", "observacao", "obs", "Observações") || "";

        return `
          <tr>
            <td class="mono">${dt ? brDate(dt) : "—"}</td>
            <td>${dt ? weekdayShort(dt) : "—"}</td>
            <td>${cd}</td>
            <td>${atividade}</td>
            <td>${obs}</td>
          </tr>
        `;
      }).join("");

      tbody.innerHTML = rows;
    }

    async function loadMonth(monthStr){
      clearErr();
      setStatus("warn","Status: carregando…");
      tbody.innerHTML = `<tr><td colspan="5" class="empty">Carregando…</td></tr>`;
      cardsMini.innerHTML = "";

      const [y, m] = monthStr.split("-").map(Number);
      const start = startOfMonth(y, m-1);
      const end = endOfMonth(y, m-1);

      try{
        // ✅ Sem índice composto: busca por range em "data" e filtra no front por analista.
        const q = query(
          collection(db, "agenda_dias"),
          orderBy("data"),
          startAt(Timestamp.fromDate(start)),
          endAt(Timestamp.fromDate(end))
        );

        const snap = await getDocs(q);

        const all = [];
        snap.forEach(ds=>{
          const data = ds.data();
          // filtra só o que é do usuário logado
          if(isMine(data)){
            all.push(data);
          }
        });

        // ordena por data (se algum doc veio sem Timestamp)
        all.sort((a,b)=>{
          const da = getDateFromDoc(a)?.getTime() || 0;
          const dbb = getDateFromDoc(b)?.getTime() || 0;
          return da - dbb;
        });

        renderSummary(all);
        renderTable(all);
        setStatus("ok", `Status: ok • ${all.length} registro(s)`);

      }catch(err){
        console.error(err);
        setStatus("danger","Status: erro");
        showErr(
          "Não consegui carregar a agenda.\n\n" +
          "Causas mais comuns:\n" +
          "1) Seus docs em agenda_dias não possuem o campo 'data' (Timestamp)\n" +
          "2) Você está salvando com outro nome de coleção\n" +
          "3) A página está em host diferente do login (localStorage não bate)\n\n" +
          "Detalhe: " + (err?.message || err)
        );
        tbody.innerHTML = `<tr><td colspan="5" class="empty">Erro ao carregar.</td></tr>`;
      }
    }

    // =========================
    // NAV
    // =========================
    $("btnMenu").addEventListener("click", ()=>{
      // está em /html usuarios/
      window.location.href = "../html menus/menu.html";
    });

    $("btnLogout").addEventListener("click", ()=>{
      localStorage.removeItem("user_session");
      localStorage.removeItem("usuarioLogado");
      window.location.href = "../index.html";
    });

    // =========================
    // INIT
    // =========================
    const now = new Date();
    const defaultMonth = `${now.getFullYear()}-${pad(now.getMonth()+1)}`;
    monthPicker.value = defaultMonth;

    monthPicker.addEventListener("change", ()=> loadMonth(monthPicker.value));
    $("btnRecarregar").addEventListener("click", ()=> loadMonth(monthPicker.value));

    loadMonth(defaultMonth);
  </script>
</body>
</html>
