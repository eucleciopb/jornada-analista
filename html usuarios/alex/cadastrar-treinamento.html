<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Cadastrar Treinamento | Produtos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/bundle-portal-user.css?v=20260720a" />
  <link rel="stylesheet" href="../../css/pages/cadastro-nascimento.css?v=20260720a" />
  <link rel="stylesheet" href="../../css/pages/alex-portal.css?v=20260720a" />
</head>
<body class="theme-user portal-page gate-pending alex-portal">

  <div class="section-block">
    <div class="section-title">
      <div>
        <h3>Cadastrar Treinamento</h3>
        <p>Registro principal com múltiplos CDs participantes.</p>
      </div>
    </div>

    <form id="formTreino" class="alex-form-grid" style="background:#fff;border:1px solid #e2e8f0;border-radius:16px;padding:16px;">
      <div>
        <label for="data">Data do treinamento</label>
        <input id="data" type="date" required />
      </div>
      <div>
        <label for="nome">Nome do treinamento</label>
        <input id="nome" type="text" list="listaCatalogo" required placeholder="Ex.: Ritual de cobertura Petra" />
        <datalist id="listaCatalogo"></datalist>
      </div>
      <div>
        <label for="marca">Marca</label>
        <input id="marca" type="text" list="listaMarcas" required />
        <datalist id="listaMarcas"></datalist>
      </div>
      <div>
        <label for="produto">Produto</label>
        <input id="produto" type="text" required />
      </div>
      <div class="full">
        <label for="tema">Tema ou conteúdo aplicado</label>
        <input id="tema" type="text" placeholder="Conteúdo principal do treinamento" />
      </div>
      <div>
        <label for="modalidade">Modalidade</label>
        <select id="modalidade" required>
          <option value="" disabled selected>Selecione...</option>
          <option>Presencial</option>
          <option>Online</option>
        </select>
      </div>
      <div>
        <label for="publico">Público</label>
        <select id="publico" required>
          <option value="" disabled selected>Selecione...</option>
        </select>
      </div>
      <div>
        <label for="quantidadePessoas">Quantidade de pessoas</label>
        <input id="quantidadePessoas" type="number" min="1" step="1" required />
      </div>
      <div>
        <label for="responsavel">Responsável pelo treinamento</label>
        <input id="responsavel" type="text" />
        <div class="hint" id="hintResp" style="font-size:12px;color:#64748b;margin-top:4px;"></div>
      </div>

      <div class="full">
        <label>CDs participantes</label>
        <div class="cd-picker">
          <div class="cd-picker-toolbar">
            <input id="cdBusca" type="search" placeholder="Pesquisar CD..." />
            <button type="button" class="btn-alex" id="btnSelTodos">Selecionar Todos</button>
            <button type="button" class="btn-alex" id="btnLimparCds">Limpar Seleção</button>
            <span class="cd-counter" id="cdCounter">0 CDs selecionados</span>
          </div>
          <div class="cd-list-box" id="cdListBox"></div>
        </div>
      </div>

      <div class="full">
        <label for="observacoes">Observações</label>
        <textarea id="observacoes"></textarea>
      </div>

      <div>
        <label for="material">Material apresentado (link ou nome)</label>
        <input id="material" type="text" placeholder="URL ou descrição do material" />
      </div>
      <div>
        <label for="evidencias">Evidências / lista de presença / fotos</label>
        <input id="evidencias" type="text" placeholder="Links ou referências dos anexos" />
      </div>

      <div class="full" style="display:flex;align-items:center;gap:10px;">
        <input id="addAgenda" type="checkbox" />
        <label for="addAgenda" style="margin:0;">Adicionar à agenda</label>
      </div>

      <div class="full" style="display:flex;gap:8px;justify-content:flex-end;">
        <button type="button" class="btn-alex" id="btnCancelar">Limpar</button>
        <button type="submit" class="btn-alex primary" id="btnSalvar">Salvar Treinamento</button>
      </div>
      <p id="msg" class="full" style="margin:0;font-weight:600;"></p>
    </form>
  </div>

<script type="module">
  import { initAlexShell, escapeHtml } from "../../js/alex/shell.js?v=20260720a";
  import {
    novoTreinamentoPayload,
    salvarTreinamento,
    registrarLog,
    carregarCds,
    PUBLICOS,
    MARCAS_PADRAO,
    mapearCds
  } from "../../js/alex/dados.js?v=20260720a";
  import { CDS_RAW } from "../../js/alex/cds-lista.js?v=20260720a";
  import { podeEditarResponsavel } from "../../js/perfil-acesso.js?v=20260720a";
  import {
    collection, getDocs, doc, setDoc, serverTimestamp
  } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  const ctx = await initAlexShell({ base: "alex", active: "cadastrar", title: "Cadastrar Treinamento" });
  if (!ctx) throw new Error("Sessão inválida");
  const { user, db } = ctx;

  const params = new URLSearchParams(location.search);
  const editId = params.get("id");

  PUBLICOS.forEach(p => {
    document.getElementById("publico").insertAdjacentHTML("beforeend", `<option value="${p}">${p}</option>`);
  });
  document.getElementById("listaMarcas").innerHTML = MARCAS_PADRAO.map(m => `<option value="${m}"></option>`).join("");

  const resp = document.getElementById("responsavel");
  resp.value = user.nome || "Alex";
  const podeResp = podeEditarResponsavel(user);
  resp.readOnly = !podeResp;
  document.getElementById("hintResp").textContent = podeResp
    ? "Administradores podem alterar o responsável."
    : "Preenchido automaticamente. Somente administradores podem alterar.";

  const hoje = new Date();
  document.getElementById("data").value = `${hoje.getFullYear()}-${String(hoje.getMonth()+1).padStart(2,"0")}-${String(hoje.getDate()).padStart(2,"0")}`;

  let CDS = await carregarCds(db, CDS_RAW);
  let selected = new Set();

  function renderCds() {
    const q = (document.getElementById("cdBusca").value || "").toLowerCase();
    const list = CDS.filter(c => !q || c.toLowerCase().includes(q));
    document.getElementById("cdListBox").innerHTML = list.map(c => `
      <label class="cd-item">
        <input type="checkbox" value="${escapeHtml(c)}" ${selected.has(c) ? "checked" : ""} />
        <span>${escapeHtml(c)}</span>
      </label>
    `).join("") || `<div class="alex-empty" style="border:0;padding:8px;">Nenhum CD encontrado</div>`;

    document.querySelectorAll("#cdListBox input[type=checkbox]").forEach(cb => {
      cb.addEventListener("change", () => {
        if (cb.checked) selected.add(cb.value);
        else selected.delete(cb.value);
        document.getElementById("cdCounter").textContent = `${selected.size} CD${selected.size===1?"":"s"} selecionado${selected.size===1?"":"s"}`;
      });
    });
    document.getElementById("cdCounter").textContent = `${selected.size} CD${selected.size===1?"":"s"} selecionado${selected.size===1?"":"s"}`;
  }

  document.getElementById("cdBusca").addEventListener("input", renderCds);
  document.getElementById("btnSelTodos").addEventListener("click", () => {
    CDS.forEach(c => selected.add(c));
    renderCds();
  });
  document.getElementById("btnLimparCds").addEventListener("click", () => {
    selected.clear();
    renderCds();
  });
  renderCds();

  // catálogo
  try {
    for (const col of ["biblioteca_treinamentos", "catalogo_treinamentos", "treinamentos"]) {
      const snap = await getDocs(collection(db, col));
      const nomes = [];
      snap.forEach(d => {
        const n = d.data()?.nome || d.data()?.treinamento || d.data()?.titulo;
        if (n) nomes.push(n);
      });
      if (nomes.length) {
        document.getElementById("listaCatalogo").innerHTML = [...new Set(nomes)].sort().map(n => `<option value="${escapeHtml(n)}"></option>`).join("");
        break;
      }
    }
  } catch {}

  function setMsg(t, ok) {
    const el = document.getElementById("msg");
    el.textContent = t || "";
    el.style.color = ok ? "#16a34a" : "#dc2626";
  }

  function limpar() {
    document.getElementById("formTreino").reset();
    resp.value = user.nome || "Alex";
    selected.clear();
    renderCds();
    setMsg("");
  }
  document.getElementById("btnCancelar").addEventListener("click", limpar);

  if (editId) {
    const { obterTreinamento } = await import("../../js/alex/dados.js?v=20260720a");
    const t = await obterTreinamento(db, editId);
    if (t) {
      document.getElementById("data").value = t.data || "";
      document.getElementById("nome").value = t.nome || "";
      document.getElementById("marca").value = t.marca || "";
      document.getElementById("produto").value = t.produto || "";
      document.getElementById("tema").value = t.tema || "";
      document.getElementById("modalidade").value = t.modalidade || "";
      document.getElementById("publico").value = t.publico || "";
      document.getElementById("quantidadePessoas").value = t.quantidadePessoas || "";
      document.getElementById("responsavel").value = t.responsavelNome || user.nome;
      document.getElementById("observacoes").value = t.observacoes || "";
      document.getElementById("material").value = t.materialApresentado || "";
      (t.cds || []).forEach(c => selected.add(c.nome || c));
      renderCds();
      document.getElementById("btnSalvar").textContent = "Atualizar Treinamento";
    }
  }

  document.getElementById("formTreino").addEventListener("submit", async (e) => {
    e.preventDefault();
    if (!selected.size) {
      setMsg("Selecione ao menos um CD participante.");
      return;
    }

    const btn = document.getElementById("btnSalvar");
    btn.disabled = true;
    setMsg("Salvando...", true);

    try {
      const payload = novoTreinamentoPayload(user, {
        id: editId || undefined,
        data: document.getElementById("data").value,
        nome: document.getElementById("nome").value,
        marca: document.getElementById("marca").value,
        produto: document.getElementById("produto").value,
        tema: document.getElementById("tema").value,
        modalidade: document.getElementById("modalidade").value,
        publico: document.getElementById("publico").value,
        quantidadePessoas: document.getElementById("quantidadePessoas").value,
        responsavelNome: resp.value || user.nome,
        responsavelId: user.uidKey,
        cds: mapearCds([...selected]),
        observacoes: document.getElementById("observacoes").value,
        materialApresentado: document.getElementById("material").value,
        anexos: document.getElementById("evidencias").value
          ? [{ tipo: "referencia", nome: document.getElementById("evidencias").value }]
          : [],
        adicionarAgenda: document.getElementById("addAgenda").checked
      });

      const saved = await salvarTreinamento(db, payload);
      await registrarLog(db, {
        usuario: user.nome,
        acao: editId ? "ALTERACAO_TREINAMENTO" : "CRIACAO_TREINAMENTO",
        registroId: saved.id,
        valorNovo: { nome: saved.nome, data: saved.data, cds: saved.quantidadeCds }
      });

      if (document.getElementById("addAgenda").checked) {
        try {
          const agendaId = `${user.uidKey}_${saved.data}`;
          await setDoc(doc(db, "agenda_dias", agendaId), {
            uidKey: user.uidKey,
            usuarioNome: user.nome,
            data: saved.data,
            yyyyMM: String(saved.data || "").slice(0, 7),
            cd: (saved.cds[0]?.nome) || "",
            atividade: `Treinamento: ${saved.nome}`,
            obs: `Marca ${saved.marca} · Produto ${saved.produto} · ${saved.quantidadeCds} CD(s)`,
            treinamentoId: saved.id,
            updatedAt: serverTimestamp()
          }, { merge: true });
        } catch (agendaErr) {
          console.warn("Agenda não atualizada:", agendaErr);
        }
      }

      setMsg(editId ? "Treinamento atualizado com sucesso." : "Treinamento salvo com sucesso.", true);
      if (!editId) limpar();
      else setTimeout(() => location.href = "./treinamentos-realizados.html", 800);
    } catch (err) {
      console.error(err);
      setMsg(err?.message || "Não foi possível salvar. Verifique as regras do Firebase.");
    } finally {
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
