<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Materiais e Anexos | Produtos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../css/bundle-portal-user.css?v=20260720a" />
  <link rel="stylesheet" href="../../css/pages/cadastro-nascimento.css?v=20260720a" />
  <link rel="stylesheet" href="../../css/pages/alex-portal.css?v=20260720a" />
</head>
<body class="theme-user portal-page gate-pending alex-portal">

  <div class="section-block">
    <div class="section-title">
      <div>
        <h3>Materiais e Anexos</h3>
        <p>Consulta dos materiais utilizados nos treinamentos de produtos.</p>
      </div>
      <a class="btn-alex" href="../biblioteca-treinamentos.html">Abrir Biblioteca</a>
    </div>

    <div class="alex-filters">
      <div class="field"><label>Marca</label><input id="fMarca" type="text" /></div>
      <div class="field"><label>Produto</label><input id="fProduto" type="text" /></div>
      <div class="field"><label>Treinamento</label><input id="fNome" type="text" /></div>
      <div class="field"><label>Data</label><input id="fData" type="date" /></div>
      <div class="field"><label>Tipo</label>
        <select id="fTipo">
          <option value="">Todos</option>
          <option value="material">Material apresentado</option>
          <option value="anexo">Anexo / evidência</option>
          <option value="biblioteca">Biblioteca</option>
        </select>
      </div>
      <div class="alex-filters-actions"><button type="button" class="btn-alex primary" id="btnFiltrar">Filtrar</button></div>
    </div>

    <div id="loading" class="alex-loading">Carregando materiais...</div>
    <div class="alex-table-wrap" id="wrap" hidden>
      <table class="alex-table" style="min-width:720px;">
        <thead>
          <tr>
            <th>Nome do arquivo / material</th>
            <th>Treinamento</th>
            <th>Marca</th>
            <th>Produto</th>
            <th>Data</th>
            <th>Tipo</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
  </div>

<script type="module">
  import { initAlexShell, escapeHtml } from "../../js/alex/shell.js?v=20260720a";
  import { listarTreinamentosCompleto } from "../../js/alex/dados.js?v=20260720a";
  import { toBR } from "../../js/alex/calculos.js?v=20260720a";
  import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js";

  const ctx = await initAlexShell({ base: "alex", active: "materiais", title: "Materiais e Anexos" });
  if (!ctx) throw new Error("Sessão inválida");
  const { user, db } = ctx;

  let ITEMS = [];

  function collectFromTreinos(treinos) {
    const out = [];
    treinos.forEach(t => {
      if (t.materialApresentado) {
        out.push({
          nome: t.materialApresentado,
          treinamento: t.nome,
          marca: t.marca,
          produto: t.produto,
          data: t.data,
          tipo: "material",
          url: /^https?:/i.test(t.materialApresentado) ? t.materialApresentado : null
        });
      }
      (t.anexos || []).forEach(a => {
        out.push({
          nome: a.nome || a.url || "Anexo",
          treinamento: t.nome,
          marca: t.marca,
          produto: t.produto,
          data: t.data,
          tipo: "anexo",
          url: a.url || ( /^https?:/i.test(a.nome||"") ? a.nome : null )
        });
      });
    });
    return out;
  }

  async function collectBiblioteca() {
    const out = [];
    for (const col of ["biblioteca_treinamentos", "catalogo_treinamentos"]) {
      try {
        const snap = await getDocs(collection(db, col));
        snap.forEach(d => {
          const data = d.data() || {};
          const nome = data.nome || data.treinamento || data.titulo;
          if (!nome) return;
          out.push({
            nome,
            treinamento: nome,
            marca: data.marca || "—",
            produto: data.produto || "—",
            data: data.data || "",
            tipo: "biblioteca",
            url: data.linkTreino || data.link || data.url || null,
            urlForms: data.linkForms || null
          });
        });
        if (out.length) break;
      } catch {}
    }
    return out;
  }

  function render(lista) {
    loading.hidden = true;
    wrap.hidden = false;
    if (!lista.length) {
      tbody.innerHTML = `<tr><td colspan="7"><div class="alex-empty">Nenhum material encontrado.</div></td></tr>`;
      return;
    }
    tbody.innerHTML = lista.map(item => `
      <tr>
        <td>${escapeHtml(item.nome)}</td>
        <td>${escapeHtml(item.treinamento || "—")}</td>
        <td>${escapeHtml(item.marca || "—")}</td>
        <td>${escapeHtml(item.produto || "—")}</td>
        <td>${item.data ? toBR(item.data) : "—"}</td>
        <td>${escapeHtml(item.tipo)}</td>
        <td class="alex-actions">
          ${item.url ? `<a class="btn-alex" href="${escapeHtml(item.url)}" target="_blank" rel="noopener">Visualizar</a>
            <a class="btn-alex" href="${escapeHtml(item.url)}" target="_blank" rel="noopener" download>Baixar</a>` : `<span style="color:#64748b;font-size:12px;">Sem link</span>`}
        </td>
      </tr>
    `).join("");
  }

  function filtrar() {
    const marca = (fMarca.value||"").toLowerCase();
    const produto = (fProduto.value||"").toLowerCase();
    const nome = (fNome.value||"").toLowerCase();
    const data = fData.value;
    const tipo = fTipo.value;
    return ITEMS.filter(i => {
      if (marca && !(i.marca||"").toLowerCase().includes(marca)) return false;
      if (produto && !(i.produto||"").toLowerCase().includes(produto)) return false;
      if (nome && !(i.treinamento||"").toLowerCase().includes(nome) && !(i.nome||"").toLowerCase().includes(nome)) return false;
      if (data && i.data !== data) return false;
      if (tipo && i.tipo !== tipo) return false;
      return true;
    });
  }

  btnFiltrar.addEventListener("click", () => render(filtrar()));

  try {
    const treinos = await listarTreinamentosCompleto(db, user, { adminVeTodos: user.isAdmin });
    const bib = await collectBiblioteca();
    ITEMS = [...collectFromTreinos(treinos), ...bib];
    render(filtrar());
  } catch (err) {
    console.error(err);
    loading.textContent = "Não foi possível carregar os materiais.";
  }
</script>
</body>
</html>
