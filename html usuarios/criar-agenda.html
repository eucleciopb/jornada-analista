<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Criar Agenda</title>

  <!-- Use seu CSS global do projeto -->
  <link rel="stylesheet" href="../css/styles.css" />

  <!-- ✅ CSS TECH CLEAN (ISOLADO NESSA TELA) -->
  <style>
    /* Requer: <body class="bg page-agenda"> */
    .page-agenda{
      --bgA:#070A0F;
      --bgB:#0B1018;
      --panel:rgba(255,255,255,.06);
      --panel2:rgba(255,255,255,.08);
      --line:rgba(255,255,255,.10);
      --line2:rgba(255,255,255,.14);
      --txt:#EEF1F6;
      --mut:rgba(238,241,246,.62);
      --accent:#ff3b3b;
      --accent2:#d91b2e;
      --ok:#22c55e;
      --warn:#facc15;
      --danger:#ef4444;
    }

    /* fundo “tech” com grid ultra sutil + glow */
    body.page-agenda.bg{
      background:
        radial-gradient(800px 420px at 16% 10%, rgba(255,59,59,.14), transparent 62%),
        radial-gradient(760px 420px at 86% 8%, rgba(217,27,46,.10), transparent 62%),
        linear-gradient(180deg, var(--bgA), var(--bgB));
      min-height:100vh;
      color:var(--txt);
      position:relative;
    }
    body.page-agenda.bg::before{
      content:"";
      position:fixed; inset:0;
      pointer-events:none;
      background:
        linear-gradient(rgba(255,255,255,.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.030) 1px, transparent 1px);
      background-size:52px 52px;
      opacity:.18;
      mix-blend-mode:overlay;
    }

    *{box-sizing:border-box}
    .wrap{max-width:1200px;margin:0 auto;padding:0 18px 30px; position:relative;}
    .hint{color:var(--mut);font-size:12px;line-height:1.35}
    .err{color:var(--danger);font-weight:800;font-size:12px;margin-top:6px;display:none}
    .msg{margin:10px 0 0;min-height:18px;font-size:12px;color:var(--mut);font-weight:700}

    /* topbar glass */
    .topbar{
      max-width:1180px;
      margin:18px auto 0;
      padding:14px 16px;
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      border-radius:22px;
      border:1px solid var(--line);
      background:linear-gradient(180deg, rgba(255,255,255,.09), rgba(255,255,255,.05));
      backdrop-filter: blur(14px);
      box-shadow: 0 20px 60px rgba(0,0,0,.55);
      position:relative;
    }
    .topbar h2{margin:0;font-size:18px;letter-spacing:.3px}
    .top-actions{display:flex;gap:10px;flex-wrap:wrap}

    /* card principal */
    .card{
      background:
        radial-gradient(900px 440px at 10% 0%, rgba(255,59,59,.10), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.05));
      border:1px solid var(--line);
      border-radius:26px;
      padding:18px;
      backdrop-filter: blur(12px);
      box-shadow: 0 30px 90px rgba(0,0,0,.65);
    }

    .row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;justify-content:space-between}
    .row h3{margin:0 0 6px;font-size:16px;letter-spacing:.2px}
    .sep{border:none;height:1px;background:rgba(255,255,255,.10);margin:16px 0}

    label{font-size:12px;color:var(--mut);display:block;margin-bottom:6px}

    #monthPicker{
      padding:10px 12px;border-radius:16px;
      border:1px solid var(--line);
      background:rgba(0,0,0,.25);
      color:var(--txt);
      outline:none;
    }
    #monthPicker:focus{
      border-color:rgba(255,59,59,.60);
      box-shadow:0 0 0 4px rgba(255,59,59,.16);
    }

    .pill{
      display:inline-flex;align-items:center;gap:8px;
      padding:8px 12px;border-radius:999px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.04);
      font-size:12px;color:rgba(238,241,246,.70);
      user-select:none;
    }

    /* botões */
    .btn{
      border:1px solid var(--line);
      border-radius:16px;
      padding:10px 14px;
      font-weight:900;
      cursor:pointer;
      background:rgba(255,255,255,.06);
      color:var(--txt);
      transition: transform .12s ease, background .2s ease, box-shadow .2s ease;
    }
    .btn:hover{
      transform: translateY(-1px);
      background: rgba(255,255,255,.10);
      box-shadow: 0 14px 34px rgba(0,0,0,.40);
    }
    .btn-primary{
      border:1px solid rgba(255,59,59,.35);
      background: linear-gradient(135deg, var(--accent2), var(--accent));
      box-shadow: 0 18px 46px rgba(255,59,59,.18);
    }
    .btn-primary:hover{
      box-shadow: 0 24px 70px rgba(255,59,59,.22);
    }

    /* tabela */
    .table-wrap{
      overflow:auto;
      margin-top:14px;
      border-radius:20px;
      border:1px solid var(--line);
      background:rgba(255,255,255,.03);
    }
    table{width:100%;border-collapse:collapse;min-width:980px}
    thead th{
      position:sticky;top:0;z-index:2;
      text-align:left;font-size:12px;color:rgba(238,241,246,.78);
      font-weight:900;padding:12px;
      border-bottom:1px solid rgba(255,255,255,.10);
      background: linear-gradient(180deg, rgba(10,12,18,.92), rgba(10,12,18,.78));
      backdrop-filter: blur(8px);
    }
    tbody td{
      padding:10px 12px;
      border-bottom:1px solid rgba(255,255,255,.06);
      vertical-align:top;
      font-size:13px;color:rgba(238,241,246,.92);
    }
    tbody tr:hover{background:rgba(255,255,255,.04)}
    tr.blocked{opacity:.60;background:rgba(255,255,255,.02)}

    .field{
      width:100%;
      padding:10px 10px;
      border-radius:16px;
      border:1px solid rgba(255,255,255,.12);
      background: rgba(0,0,0,.22);
      color: var(--txt);
      outline:none;
      transition: border-color .15s ease, box-shadow .15s ease;
    }
    .field::placeholder{color:rgba(238,241,246,.45)}
    .field:focus{
      border-color: rgba(255,59,59,.55);
      box-shadow: 0 0 0 4px rgba(255,59,59,.16);
    }
    select.field{cursor:pointer}

    /* Observações: preview pequeno, e ao focar vira editor grande (janela) */
    textarea.field[data-field="obs"]{
      min-height:54px;
      height:54px;
      resize:none;
      overflow:hidden;
      line-height:1.35;
    }
    textarea.field[data-field="obs"]:focus{
      position: fixed;
      top: 7vh;
      left: 50%;
      transform: translateX(-50%);
      width: min(980px, calc(100% - 28px));
      height: 74vh;
      z-index: 9999;

      padding: 18px;
      border-radius: 22px;

      background:
        radial-gradient(900px 440px at 10% 0%, rgba(255,59,59,.12), transparent 60%),
        linear-gradient(180deg, rgba(255,255,255,.07), rgba(0,0,0,.30));
      border: 1px solid rgba(255,255,255,.16);

      box-shadow:
        0 40px 90px rgba(0,0,0,.70),
        0 0 0 9999px rgba(0,0,0,.62);

      overflow: auto;
      resize: vertical;

      line-height: 1.65;
      font-size: 14px;
    }

    @media (max-width:720px){
      .topbar{flex-direction:column;align-items:flex-start}
      table{min-width:860px}
    }
  </style>
</head>

<body class="bg page-agenda">
  <header class="topbar">
    <div>
      <h2>Criar Agenda</h2>
      <!-- ✅ Analista logado aparece aqui -->
      <div class="hint" id="userInfo"></div>
      <div class="err" id="errBox"></div>
    </div>

    <div class="top-actions">
      <button class="btn" id="btnMenu" type="button">Voltar ao Menu</button>
      <button class="btn" id="btnLogout" type="button">Sair</button>
    </div>
  </header>

  <div class="wrap">
    <main class="card">
      <div class="row">
        <div>
          <h3>Agenda do Mês</h3>
          <div class="hint">Cada dia aparece em uma linha. Domingos ficam bloqueados.</div>
          <div class="hint">Tudo que você preencher será salvo no Firestore.</div>
        </div>
        <button class="btn btn-primary" id="btnSalvar" type="button">Salvar alterações</button>
      </div>

      <hr class="sep" />

      <div class="row">
        <div>
          <label for="monthPicker">Mês</label>
          <input id="monthPicker" type="month" />
        </div>
        <div class="pill" id="statusPill">Status: aguardando</div>
      </div>

      <div class="msg" id="msg"></div>

      <datalist id="cdList"></datalist>

      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th style="width:140px;">Data</th>
              <th style="width:110px;">Dia</th>
              <th style="width:280px;">CD</th>
              <th style="width:260px;">Atividade</th>
              <th>Observações</th>
            </tr>
          </thead>
          <tbody id="tbodyAgenda"></tbody>
        </table>
      </div>
    </main>
  </div>

  <!-- ✅ mantém seu JS (o completo que te passei) -->
  <script type="module" src="../js/criar-agenda.js"></script>
</body>

</html>
