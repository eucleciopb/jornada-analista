<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Criar Agenda</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>

<body class="bg" id="pageCriarAgenda">

  <header class="topbar">
    <div>
      <h2>Criar Agenda</h2>
      <div class="hint" id="userInfo">Usuário: —</div>
      <div class="err" id="errBox"></div>
    </div>

    <div style="display:flex;gap:10px;flex-wrap:wrap;align-items:center">
      <button class="btn-secondary" id="btnMenu" type="button">Voltar ao Menu</button>
      <button class="btn-secondary" id="btnLogout" type="button">Sair</button>
    </div>
  </header>

  <main class="card wide">
    <div class="row-between">
      <div>
        <h3 style="margin:0 0 6px">Agenda do Mês</h3>
        <div class="hint">Cada dia aparece em uma linha. Domingos ficam bloqueados.</div>
        <div class="hint">Tudo que você preencher será salvo no Firestore.</div>
      </div>

      <button id="btnSalvar" type="button">Salvar alterações</button>
    </div>

    <hr class="sep">

    <div class="row-between" style="align-items:flex-end">
      <div>
        <label for="monthPicker">Mês</label>
        <input id="monthPicker" type="month" />
      </div>

      <div class="pill" id="statusPill">Status: aguardando</div>
    </div>

    <div class="msg" id="msg"></div>

    <datalist id="cdList"></datalist>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th style="width:140px;">Data</th>
            <th style="width:110px;">Dia</th>
            <th style="width:320px;">CD</th>
            <th style="width:260px;">Atividade</th>
            <th>Observações</th>
          </tr>
        </thead>
        <tbody id="tbodyAgenda"></tbody>
      </table>
    </div>
  </main>

  <!-- =========================
       MODAL OBSERVAÇÕES
  ========================== -->
  <div class="modal" id="obsModal" aria-hidden="true">
    <div class="modal-backdrop" data-close="1"></div>

    <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="obsTitle">
      <div class="modal-head">
        <div>
          <h3 id="obsTitle">Observações</h3>
          <div class="modal-sub" id="obsSub">Edite com calma e salve.</div>
        </div>
        <button class="icon-btn" id="obsClose" type="button" title="Fechar">✕</button>
      </div>

      <div class="modal-body">
        <label class="modal-label" for="obsBig">Texto</label>
        <textarea id="obsBig" class="modal-textarea" placeholder="Digite as observações aqui..."></textarea>
      </div>

      <div class="modal-foot">
        <button class="btn-ghost" id="obsCancel" type="button">Cancelar</button>
        <button class="btn-primary" id="obsSave" type="button">Salvar</button>
      </div>
    </div>
  </div>

  <script type="module" src="../js/criar-agenda.js"></script>
</body>
</html>
